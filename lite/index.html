<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimAMOC Lite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060c16;color:#c8d8e8;font-family:system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* Full-bleed canvas */
.sim-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
canvas{image-rendering:pixelated;max-width:100%;max-height:100%}

/* Top bar: view pills */
.topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;gap:5px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;background:linear-gradient(180deg,rgba(6,12,22,.88) 60%,transparent)}
.topbar::-webkit-scrollbar{display:none}
.topbar button{flex-shrink:0;padding:5px 12px;border-radius:14px;font-size:11px;font-weight:500;color:rgba(160,200,220,.7);background:rgba(20,32,48,.6);border:1px solid rgba(40,60,80,.5);cursor:pointer;white-space:nowrap;transition:.15s}
.topbar button:hover{background:rgba(30,50,70,.8)}
.topbar button.active{color:#fff;background:rgba(74,158,200,.35);border-color:rgba(74,158,200,.6)}
.topbar .sep{width:1px;align-self:stretch;background:rgba(60,90,120,.3);margin:0 2px;flex-shrink:0}
.topbar .label{font-size:9px;font-weight:600;color:rgba(120,160,190,.5);text-transform:uppercase;letter-spacing:.06em;align-self:center;padding:0 2px;white-space:nowrap}

/* HUD: top-right */
.hud{position:fixed;top:42px;right:10px;z-index:10;display:flex;gap:14px;padding:5px 12px;border-radius:8px;background:rgba(6,12,22,.65);backdrop-filter:blur(6px);font-variant-numeric:tabular-nums}
.hud-item{text-align:center}
.hud-item .l{font-size:8px;color:#4a7a98;text-transform:uppercase;letter-spacing:.5px}
.hud-item .v{font-size:13px;font-weight:300;color:#5abbe8}

/* Bottom bar: unified controls */
.bottombar{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:12px;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(6,10,18,.92);border-top:1px solid rgba(26,40,56,.6);backdrop-filter:blur(12px)}
.bottombar button{background:rgba(20,32,48,.8);border:1px solid rgba(50,70,90,.6);color:#7ab0d0;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.bottombar button:hover{background:rgba(30,50,70,.9);border-color:#4a9ec8}

/* Speed section */
.speed-section{display:flex;align-items:center;gap:8px;flex:1;max-width:300px}
.speed-section label{font-size:10px;color:#4a7a98;white-space:nowrap;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.speed-section input[type=range]{flex:1;height:28px;accent-color:#4a9ec8;cursor:pointer}
.speed-section .speed-val{font-size:13px;color:#5abbe8;min-width:50px;text-align:center;font-weight:300;font-variant-numeric:tabular-nums}

/* Divider */
.bar-div{width:1px;height:24px;background:rgba(60,90,120,.3);flex-shrink:0}

/* Climate sliders section */
.climate-section{display:flex;align-items:center;gap:10px;flex:1}
.climate-slider{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
.climate-slider label{font-size:9px;color:#5a8098;white-space:nowrap;min-width:28px;text-align:right}
.climate-slider input[type=range]{flex:1;height:24px;accent-color:#4a9ec8;min-width:40px}
.climate-slider .val{font-size:10px;color:#4a9ec8;min-width:30px;font-variant-numeric:tabular-nums}

/* Loading */
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#5a9ec8;font-size:14px;font-weight:300;z-index:50}
.spinner{width:36px;height:36px;border:2px solid rgba(74,158,200,.2);border-top-color:#4a9ec8;border-radius:50%;margin:0 auto 10px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Year counter - top left */
.year-display{position:fixed;top:42px;left:10px;z-index:10;padding:5px 12px;border-radius:8px;background:rgba(6,12,22,.65);backdrop-filter:blur(6px)}
.year-display .l{font-size:8px;color:#4a7a98;text-transform:uppercase;letter-spacing:.5px}
.year-display .v{font-size:15px;font-weight:300;color:#5abbe8;font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<div class="sim-wrap">
  <div class="loading" id="loading"><div class="spinner"></div>Loading ocean data...</div>
  <canvas id="sim" width="1024" height="512"></canvas>
</div>

<div class="topbar" id="topbar">
  <span class="label">Surface</span>
  <button class="active" data-view="temp">SST</button>
  <button data-view="psi">Currents</button>
  <button data-view="speed">Speed</button>
  <button data-view="sal">Salinity</button>
  <button data-view="density">Density</button>
  <span class="sep"></span>
  <span class="label">Deep</span>
  <button data-view="deeptemp">Temp</button>
  <button data-view="deepflow">Currents</button>
  <button data-view="deepsal">Salinity</button>
  <span class="sep"></span>
  <span class="label">Atmos</span>
  <button data-view="airtemp">Temp</button>
  <button data-view="moisture">Humidity</button>
  <button data-view="precip">Precip</button>
  <button data-view="windcurl">Wind</button>
  <span class="sep"></span>
  <span class="label">Data</span>
  <button data-view="obssst">Obs SST</button>
  <button data-view="obssal">Obs Sal</button>
  <button data-view="depth">Bathymetry</button>
  <button data-view="sstdiff">SST Diff</button>
  <button data-view="vort">Vorticity</button>
  <span class="sep"></span>
  <button data-view="particles" id="btn-particles" style="border-style:dashed" class="active">Particles</button>
</div>

<div class="year-display">
  <div class="l">Year</div>
  <div class="v" id="hud-year">0</div>
</div>

<div class="hud">
  <div class="hud-item"><div class="l">AMOC</div><div class="v" id="hud-amoc">--</div></div>
  <div class="hud-item"><div class="l">Season</div><div class="v" id="hud-season">Jan</div></div>
  <div class="hud-item"><div class="l">RMSE</div><div class="v" id="hud-rmse">--</div></div>
</div>

<div class="bottombar">
  <button id="btn-pause" title="Pause (Space)">&#9646;&#9646;</button>
  <button id="btn-reset" title="Reset" style="font-size:13px">&#8635;</button>

  <div class="bar-div"></div>

  <div class="speed-section">
    <label>Speed</label>
    <input type="range" id="sl-speed" min="1" max="100" value="70">
    <span class="speed-val" id="v-speed">10x</span>
  </div>

  <div class="bar-div"></div>

  <div class="climate-section">
    <div class="climate-slider"><label>FW</label><input type="range" id="sl-fw" min="0" max="2" step="0.01" value="0"><span class="val" id="v-fw">0</span></div>
    <div class="climate-slider"><label>CO2</label><input type="range" id="sl-co2" min="280" max="1200" step="10" value="420"><span class="val" id="v-co2">420</span></div>
    <div class="climate-slider"><label>Wind</label><input type="range" id="sl-wind" min="0" max="2" step="0.01" value="1"><span class="val" id="v-wind">1.0</span></div>
  </div>
</div>

<script src="engine.js"></script>
<script>
(function() {
  'use strict';

  var canvas = document.getElementById('sim');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var showView = 'temp';
  var showParticles = true;

  // Colormaps
  function tempColor(t) {
    var f = Math.max(0, Math.min(1, (t + 2) / 34));
    if (f < 0.25) return [10 + 40*f*4, 20 + 60*f*4, 80 + 120*f*4];
    if (f < 0.5) { var g = (f-.25)*4; return [50, 80+100*g, 200-40*g]; }
    if (f < 0.75) { var g = (f-.5)*4; return [50+180*g, 180+40*g, 160-120*g]; }
    var g = (f-.75)*4; return [230+25*g, 220-120*g, 40-30*g];
  }

  function psiColor(v) {
    var s = Math.sign(v), a = Math.min(1, Math.abs(v) / 2);
    if (s >= 0) return [20+60*a, 40+100*a, 80+140*a];
    return [80+140*a, 40+60*a, 20+40*a];
  }

  function speedColor(s) {
    var f = Math.min(1, s / 0.05);
    if (f < 0.33) { var g = f*3; return [10, 20+60*g, 40+100*g]; }
    if (f < 0.67) { var g = (f-.33)*3; return [10+200*g, 80+80*g, 140-40*g]; }
    var g = (f-.67)*3; return [210+45*g, 160+40*g, 100-60*g];
  }

  function salColor(s) {
    var f = Math.max(0, Math.min(1, (s - 32) / 6));
    if (f < 0.5) { var g = f*2; return [40+60*g, 30+80*g, 120+60*g]; }
    var g = (f-.5)*2; return [100+100*g, 110+40*g, 180-80*g];
  }

  function divColor(v, scale) {
    var f = Math.max(-1, Math.min(1, v / scale));
    if (f < 0) return [20-200*f, 40-120*f, 120+80*f];
    return [120+135*f, 40-30*f, 20];
  }

  function depthColor(d) {
    var f = Math.max(0, Math.min(1, d / 6000));
    return [10+20*(1-f), 20+50*(1-f), 40+160*(1-f)];
  }

  function moistColor(q) {
    var f = Math.max(0, Math.min(1, q / 0.025));
    if (f < 0.5) { var g = f*2; return [20+30*g, 30+60*g, 50+100*g]; }
    var g = (f-.5)*2; return [50+100*g, 90+80*g, 150-50*g];
  }

  function precipColor(p) {
    var f = Math.min(1, p * 2000);
    if (f < 0.5) { var g = f*2; return [20, 40+80*g, 60+100*g]; }
    var g = (f-.5)*2; return [20+180*g, 120+40*g, 160-60*g];
  }

  function elevColor(e) {
    if (e < 100) { var t = e/100; return [26+16*t, 62+32*t, 32+16*t]; }
    if (e < 500) { var t = (e-100)/400; return [42+96*t, 94-16*t, 48+32*t]; }
    if (e < 2000) { var t = (e-500)/1500; return [138-32*t, 122-42*t, 80-16*t]; }
    if (e < 4000) { var t = (e-2000)/2000; return [106+48*t, 80+64*t, 64+80*t]; }
    var t = Math.min(1, (e-4000)/4000); return [154+54*t, 144+64*t, 144+64*t];
  }

  // Map underlay (cached)
  var mapImg = null;
  function buildMap() {
    var c = document.createElement('canvas');
    c.width = W; c.height = H;
    var mc = c.getContext('2d');
    mc.fillStyle = '#0a1420';
    mc.fillRect(0, 0, W, H);
    var NX = sim.NX, NY = sim.NY, mask = sim.mask, elev = sim.elevation;
    var cw = W / NX, ch = H / NY;
    for (var j = 0; j < NY; j++) {
      for (var i = 0; i < NX; i++) {
        if (mask[j * NX + i]) continue;
        if (elev) {
          var e = elev[j * NX + i] || 0;
          var rgb = elevColor(e);
          mc.fillStyle = 'rgb(' + Math.floor(rgb[0]) + ',' + Math.floor(rgb[1]) + ',' + Math.floor(rgb[2]) + ')';
        } else {
          mc.fillStyle = '#1a2e20';
        }
        mc.fillRect(i * cw, (NY - 1 - j) * ch, cw + 0.5, ch + 0.5);
      }
    }
    mc.strokeStyle = 'rgba(255,255,255,0.04)';
    mc.lineWidth = 0.5;
    for (var lat = -60; lat <= 60; lat += 30) {
      var y = (1 - (lat - sim.LAT0) / (sim.LAT1 - sim.LAT0)) * H;
      mc.beginPath(); mc.moveTo(0, y); mc.lineTo(W, y); mc.stroke();
      mc.fillStyle = 'rgba(255,255,255,0.1)';
      mc.font = '8px system-ui'; mc.textAlign = 'right';
      mc.fillText((lat >= 0 ? lat + '\u00b0N' : Math.abs(lat) + '\u00b0S'), W - 3, y - 2);
    }
    mapImg = c;
  }

  // Render at sim resolution then scale up (much faster than fillRect per cell)
  var simCanvas = document.createElement('canvas');
  simCanvas.width = 360; simCanvas.height = 180;
  var simCtx = simCanvas.getContext('2d');
  var simImg = simCtx.createImageData(360, 180);
  var simD = simImg.data;

  function getPixel(j, i, k, isOcean) {
    var isAtmos = (showView === 'airtemp' || showView === 'moisture' || showView === 'precip' || showView === 'windcurl');
    var isObs = (showView === 'obssst' || showView === 'obssal');
    var isDepthView = showView === 'depth';
    if (!isOcean && !isAtmos && !isObs && !isDepthView) return null;

    switch (showView) {
      case 'temp': return isOcean ? tempColor(sim.temp[k]) : null;
      case 'psi': return isOcean ? psiColor(sim.psi[k]) : null;
      case 'speed':
        if (!isOcean) return null;
        var vel = sim.getVel(i, j);
        return speedColor(Math.sqrt(vel[0]*vel[0] + vel[1]*vel[1]));
      case 'sal': return isOcean ? salColor(sim.sal[k]) : null;
      case 'density':
        if (!isOcean) return null;
        var rho = -0.05 * sim.temp[k] + 0.8 * sim.sal[k];
        var f = Math.max(0,Math.min(1,(rho-25)/5));
        return [40+180*f, 100+60*f, 180-120*f];
      case 'deeptemp': return isOcean ? tempColor(sim.deepTemp[k]) : null;
      case 'deepflow': return isOcean ? psiColor(sim.deepPsi[k]) : null;
      case 'deepsal': return isOcean ? salColor(sim.deepSal[k]) : null;
      case 'airtemp': return tempColor(sim.airTemp[k]);
      case 'moisture': return moistColor(sim.moisture[k]);
      case 'precip': return precipColor(sim.precipField[k]);
      case 'windcurl': return divColor(sim.windCurlField[k], 0.3);
      case 'obssst':
        if (!sim.obsSSTData || !sim.obsSSTData.sst) return null;
        var oj = sim.obsIndex(j), onx = sim.obsSSTData.nx||360, ony = sim.obsSSTData.ny||160;
        if (oj<0||oj>=ony) return null;
        var ov = sim.obsSSTData.sst[oj*onx+Math.min(i,onx-1)];
        return (ov&&ov>-90) ? tempColor(ov) : null;
      case 'obssal':
        if (!sim.obsSalinityData || !sim.obsSalinityData.salinity) return null;
        var oj = sim.obsIndex(j), onx = sim.obsSalinityData.nx||360, ony = sim.obsSalinityData.ny||160;
        if (oj<0||oj>=ony) return null;
        var ov = sim.obsSalinityData.salinity[oj*onx+Math.min(i,onx-1)];
        return (ov&&ov>1) ? salColor(ov) : null;
      case 'depth':
        if (isOcean && sim.obsBathyData && sim.obsBathyData.depth) {
          var oj = sim.obsIndex(j), onx = sim.obsBathyData.nx||360, ony = sim.obsBathyData.ny||160;
          if (oj>=0&&oj<ony) return depthColor(sim.obsBathyData.depth[oj*onx+Math.min(i,onx-1)]||0);
        } else if (!isOcean && sim.elevation) {
          return elevColor(Math.max(0, sim.elevation[k]||0));
        }
        return null;
      case 'sstdiff':
        if (!isOcean || !sim.obsSSTData || !sim.obsSSTData.sst) return null;
        var oj = sim.obsIndex(j), onx = sim.obsSSTData.nx||360, ony = sim.obsSSTData.ny||160;
        if (oj<0||oj>=ony) return null;
        var ov = sim.obsSSTData.sst[oj*onx+Math.min(i,onx-1)];
        return (ov&&ov>-90) ? divColor(sim.temp[k]-ov, 5) : null;
      case 'vort': return isOcean ? divColor(sim.zeta[k], 50) : null;
      default: return isOcean ? tempColor(sim.temp[k]) : null;
    }
  }

  function renderFrame() {
    var NX = sim.NX, NY = sim.NY, mask = sim.mask;

    // Write pixels to sim-resolution ImageData
    for (var j = 0; j < NY; j++) {
      var sy = NY - 1 - j; // flip: j=0 is south, screen top is north
      for (var i = 0; i < NX; i++) {
        var k = j * NX + i;
        var off = (sy * NX + i) * 4;
        var isOcean = mask[k];
        var rgb = getPixel(j, i, k, isOcean);
        if (!rgb) {
          // Land: use elevation or default
          if (sim.elevation && !isOcean) {
            rgb = elevColor(Math.max(0, sim.elevation[k] || 0));
          } else if (!isOcean) {
            simD[off] = 26; simD[off+1] = 46; simD[off+2] = 32; simD[off+3] = 255;
            continue;
          } else {
            simD[off] = 10; simD[off+1] = 20; simD[off+2] = 32; simD[off+3] = 255;
            continue;
          }
        }
        simD[off] = rgb[0]; simD[off+1] = rgb[1]; simD[off+2] = rgb[2]; simD[off+3] = 255;
      }
    }
    simCtx.putImageData(simImg, 0, 0);

    // Scale up to display canvas
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(simCanvas, 0, 0, W, H);

    // Particles (drawn on display canvas)
    if (showParticles) {
      for (var p = 0; p < sim.NP; p++) {
        var age = sim.page[p] / sim.MAX_AGE;
        var alpha = age < 0.1 ? age * 10 : (age > 0.8 ? (1 - age) * 5 : 1);
        var sx = (sim.px[p] / NX) * W;
        var sy = (1 - sim.py[p] / NY) * H;
        ctx.globalAlpha = alpha * 0.5;
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx - 0.5, sy - 0.5, 2, 2);
      }
      ctx.globalAlpha = 1;
    }
  }

  // Speed slider: logarithmic mapping
  // slider 1-100 maps to:
  //   stepsPerFrame: 5 to 1000
  //   yearSpeed: 0.5 to 30
  function applySpeed(val) {
    var t = val / 100; // 0.01 to 1
    var spf = Math.round(5 + 995 * t * t); // quadratic: 5 to 1000
    var yr = 0.5 + 29.5 * t * t;
    sim.stepsPerFrame = spf;
    sim.yearSpeed = yr;
    // Display as approximate multiplier
    var mult = (spf * yr / 5).toFixed(0);
    if (mult > 1000) mult = (mult / 1000).toFixed(1) + 'k';
    document.getElementById('v-speed').textContent = mult + 'x';
  }

  // Main loop
  var frameCount = 0;
  function loop() {
    requestAnimationFrame(loop);
    if (!sim.mask) return;

    if (!sim.paused) {
      for (var s = 0; s < sim.stepsPerFrame; s++) sim.step();
      sim.advectParticles();
      if (frameCount % 10 === 0) sim.stabilityCheck();
    }

    renderFrame();

    if (frameCount % 15 === 0) {
      document.getElementById('hud-amoc').textContent = sim.computeAMOC().toFixed(2);
      document.getElementById('hud-season').textContent = sim.getSeason();
      var rmse = sim.computeRMSE();
      document.getElementById('hud-rmse').textContent = isFinite(rmse) ? rmse.toFixed(2) + '\u00b0C' : '--';
      var years = (sim.simTime / 10).toFixed(1); // T_YEAR = 10
      document.getElementById('hud-year').textContent = years;
    }
    frameCount++;
  }

  // UI wiring
  document.getElementById('topbar').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn || !btn.dataset.view) return;
    if (btn.dataset.view === 'particles') {
      showParticles = !showParticles;
      btn.classList.toggle('active', showParticles);
      return;
    }
    showView = btn.dataset.view;
    document.querySelectorAll('#topbar button[data-view]').forEach(function(b) {
      if (b.dataset.view !== 'particles') b.classList.toggle('active', b.dataset.view === showView);
    });
  });

  document.getElementById('btn-pause').addEventListener('click', function() {
    sim.paused = !sim.paused;
    this.innerHTML = sim.paused ? '&#9654;' : '&#9646;&#9646;';
  });

  document.getElementById('btn-reset').addEventListener('click', function() {
    sim.reset();
    buildMap();
  });

  // Speed slider
  document.getElementById('sl-speed').addEventListener('input', function() {
    applySpeed(parseInt(this.value));
  });

  // Climate sliders
  document.getElementById('sl-fw').addEventListener('input', function() {
    sim.freshwaterForcing = parseFloat(this.value);
    document.getElementById('v-fw').textContent = parseFloat(this.value).toFixed(1);
  });
  document.getElementById('sl-co2').addEventListener('input', function() {
    sim.co2_ppm = parseFloat(this.value);
    document.getElementById('v-co2').textContent = this.value;
  });
  document.getElementById('sl-wind').addEventListener('input', function() {
    sim.windStrength = parseFloat(this.value);
    document.getElementById('v-wind').textContent = parseFloat(this.value).toFixed(1);
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ') { e.preventDefault(); sim.paused = !sim.paused; document.getElementById('btn-pause').innerHTML = sim.paused ? '&#9654;' : '&#9646;&#9646;'; }
    if (e.key === 'p') { showParticles = !showParticles; document.getElementById('btn-particles').classList.toggle('active', showParticles); }
  });

  // Init
  sim.init().then(function() {
    document.getElementById('loading').style.display = 'none';
    buildMap();
    applySpeed(70); // default: fast
    loop();
  });
})();
</script>
</body>
</html>
