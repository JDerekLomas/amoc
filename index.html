<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMOC Tipping Point Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1018;color:#d0dae8;font-family:'Segoe UI',system-ui,sans-serif}
h1{text-align:center;padding:10px 0 2px;font-size:1.3em;font-weight:300;color:#7ab8de;letter-spacing:.04em}
.sub{text-align:center;font-size:.72em;color:#5a7e98;margin-bottom:6px}
.grid{display:grid;grid-template-columns:1fr 360px;gap:10px;max-width:1440px;margin:0 auto;padding:0 12px 12px}
.stats{grid-column:1/-1;display:flex;gap:14px;justify-content:center;padding:4px 0}
.st{text-align:center}.st .l{font-size:.62em;color:#4a6a82;text-transform:uppercase;letter-spacing:.1em}
.st .v{font-size:1.3em;font-weight:300;font-variant-numeric:tabular-nums}
.st .v.on{color:#40c878}.st .v.weak{color:#ddb040}.st .v.off{color:#d06060}
.st .u{font-size:.4em;color:#4a6a82;margin-left:2px}
.map-box{grid-row:2/5;background:#0c1420;border:1px solid #1e3040;border-radius:8px;position:relative;overflow:hidden;cursor:grab}
.map-box.dragging{cursor:grabbing}
.map-box canvas{display:block;width:100%}
.side{background:#101828;border:1px solid #1e3040;border-radius:8px;padding:10px}
.side h2{font-size:.72em;font-weight:500;color:#5a90b0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}
.side canvas{width:100%;display:block}
.ctrls{grid-column:1/-1;background:#101828;border:1px solid #1e3040;border-radius:8px;padding:10px 16px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.cg{flex:1;min-width:180px}.cg label{display:block;font-size:.75em;color:#6a8aa4;margin-bottom:2px}
input[type=range]{width:100%;accent-color:#4a9ec8;cursor:pointer}
.val{color:#4a9ec8;font-weight:600;font-variant-numeric:tabular-nums}
.btns{display:flex;gap:5px;flex-wrap:wrap}
button{background:#162838;border:1px solid #2a4058;color:#7ab0d0;padding:5px 11px;border-radius:4px;cursor:pointer;font-size:.75em;transition:.12s}
button:hover{background:#1e3848;border-color:#4a9ec8}
button.active{background:#1a3858;border-color:#4a9ec8;color:#a0d4f0}
.map-ui{position:absolute;top:8px;right:8px;display:flex;gap:3px;z-index:2;flex-wrap:wrap;max-width:200px;justify-content:flex-end}
.map-ui button{font-size:.65em;padding:3px 7px}
.map-leg{position:absolute;bottom:6px;left:8px;font-size:.62em;color:#506878;line-height:1.5;pointer-events:none}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}
.zoom-hint{position:absolute;bottom:6px;right:8px;font-size:.58em;color:#405060;pointer-events:none}
@media(max-width:960px){.grid{grid-template-columns:1fr}.map-box{grid-row:auto}}
</style>
</head>
<body>
<div style="display:flex;justify-content:center;gap:0;padding-top:6px">
  <span style="font-size:.7em;padding:4px 10px;color:#a0d4f0;border:1px solid #4a9ec8;border-radius:4px 0 0 4px;background:rgba(20,56,88,.7)">Flat Map</span>
  <a href="v2/index.html" style="font-size:.7em;padding:4px 10px;color:#5a8aaa;text-decoration:none;border:1px solid #1e3040;background:rgba(10,18,28,.7)">Globe</a>
  <a href="v3-oscar/index.html" style="font-size:.7em;padding:4px 10px;color:#5a8aaa;text-decoration:none;border:1px solid #1e3040;background:rgba(10,18,28,.7)">Currents</a>
  <a href="v4-physics/index.html" style="font-size:.7em;padding:4px 10px;color:#5a8aaa;text-decoration:none;border:1px solid #1e3040;border-radius:0 4px 4px 0;background:rgba(10,18,28,.7)">Physics</a>

<p class="sub">Stommel two-box model &middot; Scroll to zoom, drag to pan</p>

.2],[-48,82.1],[-46.8,82.6],[-35.1,83.6],[-27.1,83.5]]];

// Circulation paths
const SURF=[[-55,-45],[-50,-38],[-46,-32],[-42,-24],[-38,-16],[-36,-8],[-35,-2],[-38,4],[-48,8],[-58,12],[-66,17],[-74,22],[-80,25.5],[-79.5,30],[-77,33],[-75.5,35.2],[-72,37],[-68,38.5],[-62,40],[-55,41],[-50,42],[-42,44],[-35,47],[-28,50],[-20,53],[-15,56],[-10,58],[-5,60],[0,62],[5,64],[5,67],[2,70],[-5,72]];
const DEEP=[[-5,72],[-10,70],[-18,68],[-24,66.5],[-30,65],[-38,63],[-46,60],[-52,57],[-52,52],[-53,47],[-55,42],[-56,38],[-54,34],[-52,30],[-50,26],[-48,22],[-45,18],[-42,12],[-40,6],[-38,0],[-37,-6],[-38,-12],[-40,-18],[-44,-24],[-48,-30],[-52,-36],[-55,-42],[-55,-45]];
const LOOP=SURF.concat(DEEP.slice(1)),LL=LOOP.length,SE=SURF.length-1;

// ============================================================
// SST DATA — synthetic but physically realistic Atlantic SST (°C)
// Based on climatological annual-mean patterns
// Grid: 5° resolution, lon -100 to 40, lat -55 to 75
// ============================================================
// NOAA OISST v2.1 — real SST data (loaded async from JSON)
// 1-degree grid, Atlantic basin, July 2024 snapshot
// Source: coastwatch.pfeg.noaa.gov/erddap (ncdcOisst21Agg_LonPM180)
let sstData=null; // {lat:[], lon:[], sst:[] (flat, row-major, null=land)}
fetch('sst_atlantic_1deg.json').then(r=>r.json()).then(d=>{sstData=d;}).catch(()=>{});

function sstColor(temp){
  // Colormap: dark blue (-2) -> blue (5) -> cyan (12) -> green (18) -> yellow (24) -> orange (27) -> red (30)
  const t=Math.max(-2,Math.min(30,temp));
  const n=(t+2)/32; // 0-1
  let r,g,b;
  if(n<.2){const f=n/.2;r=10+f*20;g=20+f*60;b=80+f*100;}
  else if(n<.4){const f=(n-.2)/.2;r=30-f*10;g=80+f*100;b=180-f*40;}
  else if(n<.6){const f=(n-.4)/.2;r=20+f*100;g=180+f*40;b=140-f*100;}
  else if(n<.8){const f=(n-.6)/.2;r=120+f*110;g=220-f*40;b=40-f*30;}
  else{const f=(n-.8)/.2;r=230+f*25;g=180-f*100;b=10+f*20;}
  return[r|0,g|0,b|0];
}

// ============================================================
// PROJECTION with pan & zoom
// ============================================================
const BASE={lnA:-105,lnB:45,ltA:-56,ltB:82};
let cam={ox:0,oy:0,zoom:1}; // pan offset in pixels, zoom multiplier

const mercY=l=>Math.log(Math.tan(Math.PI/4+(l*Math.PI/180)/2));
const mercYmin=mercY(BASE.ltA),mercYmax=mercY(BASE.ltB);

function pr(lon,lat,w,h){
  const m=6,pw=w-2*m,ph=h-2*m;
  const x=(m+((lon-BASE.lnA)/(BASE.lnB-BASE.lnA))*pw)*cam.zoom+cam.ox;
  const y=(m+(1-(mercY(lat)-mercYmin)/(mercYmax-mercYmin))*ph)*cam.zoom+cam.oy;
  return[x,y];
}

function unpr(sx,sy,w,h){
  const m=6,pw=w-2*m,ph=h-2*m;
  const rx=(sx-cam.ox)/cam.zoom;
  const ry=(sy-cam.oy)/cam.zoom;
  const lon=BASE.lnA+((rx-m)/pw)*(BASE.lnB-BASE.lnA);
  const my=mercYmin+(1-(ry-m)/ph)*(mercYmax-mercYmin);
  const lat=(2*Math.atan(Math.exp(my))-Math.PI/2)*180/Math.PI;
  return[lon,lat];
}

// ============================================================
// STOMMEL MODEL
// ============================================================
const C={Ts:25,Ss:2,qs:20,d:1/6,y0:.8,x0:.5,F:.5};
let Md={y:C.y0,x:C.x0,t:0,h:[],bf:[],paused:0,ramp:0,dir:1,hyst:0};
let spd=1,vw='both',showSST=true;

const qf=(y,x)=>y-x;
const dY=(y,x,q)=>1-y-Math.abs(q)*y;
const dX=(y,x,q,F)=>C.d*(F-x)-Math.abs(q)*x;
function rk(y,x,F,dt){
  const q1=qf(y,x),ky1=dY(y,x,q1),kx1=dX(y,x,q1,F);
  const q2=qf(y+.5*dt*ky1,x+.5*dt*kx1),ky2=dY(y+.5*dt*ky1,x+.5*dt*kx1,q2),kx2=dX(y+.5*dt*ky1,x+.5*dt*kx1,q2,F);
  const q3=qf(y+.5*dt*ky2,x+.5*dt*kx2),ky3=dY(y+.5*dt*ky2,x+.5*dt*kx2,q3),kx3=dX(y+.5*dt*ky2,x+.5*dt*kx2,q3,F);
  const q4=qf(y+dt*ky3,x+dt*kx3),ky4=dY(y+dt*ky3,x+dt*kx3,q4),kx4=dX(y+dt*ky3,x+dt*kx3,q4,F);
  return{y:y+(dt/6)*(ky1+2*ky2+2*ky3+ky4),x:x+(dt/6)*(kx1+2*kx2+2*kx3+kx4)};
}
function findEq(F){
  const d=C.d,R=[];let pR=null,pQ=null;
  for(let i=0;i<=2000;i++){const qv=-1.5+3*i/2000,a=Math.abs(qv),r=(1/(1+a)-d*F/(d+a))-qv;
    if(pR!==null&&r*pR<0){let lo=pQ,hi=qv,rL=pR;for(let j=0;j<40;j++){const m=(lo+hi)/2,am=Math.abs(m),rm=(1/(1+am)-d*F/(d+am))-m;if(rm*rL<0)hi=m;else{lo=m;rL=rm;}}
    const qe=(lo+hi)/2,ae=Math.abs(qe),ye=1/(1+ae),xe=d*F/(d+ae);let a11,a12,a21,a22;
    if(qe>=0){a11=-(1+qe+ye);a12=ye;a21=-xe;a22=-(d+qe-xe);}else{a11=-(1-qe-ye);a12=-ye;a21=xe;a22=-(d-qe+xe);}
    R.push({q:qe,y:ye,x:xe,s:a11+a22<0&&a11*a22-a12*a21>0});}pR=r;pQ=qv;}return R;
}

// Particles
const NP=500,P=[];
function initP(){P.length=0;for(let i=0;i<NP;i++)P.push({t:Math.random()*(LL-1),sp:(Math.random()-.5)*12,sy:(Math.random()-.5)*5,sz:1+Math.random()*1.8});}
function pPos(p,w,h){
  let t=((p.t%(LL-1))+(LL-1))%(LL-1);const i=Math.floor(t),f=t-i,a=LOOP[i%LL],b=LOOP[(i+1)%LL];
  const[px,py]=pr(a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,w,h);
  const[ax,ay]=pr(a[0],a[1],w,h),[bx,by]=pr(b[0],b[1],w,h);
  let dx=bx-ax,dy=by-ay;const l=Math.sqrt(dx*dx+dy*dy)||1;dx/=l;dy/=l;
  return{x:px+(-dy)*p.sp+dx*p.sy,y:py+dx*p.sp+dy*p.sy,sf:t<=SE};
}

const mapC=document.getElementById('map');

function initCanvas(c){
  const dpr=devicePixelRatio||1,r=c.getBoundingClientRect();
  c.width=r.width*dpr;c.height=r.height*dpr;
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  return{ctx,w:r.width,h:r.height};
}
function setup(){
  ({ctx:mc,w:mw,h:mh}=initCanvas(mapC));
  ({ctx:bc,w:bw,h:bh}=initCanvas(document.getElementById('bif')));
  ({ctx:tc,w:tw,h:th}=initCanvas(document.getElementById('ts')));
  trailC=document.createElement('canvas');
  trailC.width=mapC.width;trailC.height=mapC.height;
}

function drawMap(qDim){
  const ctx=mc,w=mw,h=mh;
  const qn=Math.max(-1,Math.min(1,qDim/C.qs)),aq=Math.abs(qn);

  // Clear
  ctx.fillStyle='#0e1620';ctx.fillRect(0,0,w,h);

  // SST thermal map layer (real NOAA data)
  if(showSST&&sstData){
    const sd=sstData, nlat=sd.lat.length, nlon=sd.lon.length;
    ctx.globalAlpha=0.55;
    for(let li=0;li<nlat-1;li++){
      for(let lo=0;lo<nlon-1;lo++){
        const temp=sd.sst[li*nlon+lo];
        if(temp===null)continue;
        const[r,g,b]=sstColor(temp);
        const lat0=sd.lat[li],lat1=sd.lat[li+1];
        const lon0=sd.lon[lo],lon1=sd.lon[lo+1];
        const[x0,y0_]=pr(lon0,lat1,w,h);
        const[x1,y1_]=pr(lon1,lat0,w,h);
        ctx.fillStyle=`rgb(${r},${g},${b})`;
        ctx.fillRect(x0,y0_,x1-x0+1,y1_-y0_+1);
      }
    }
    ctx.globalAlpha=1;
  }

  // Graticule
  ctx.strokeStyle=showSST?'rgba(255,255,255,.06)':'#101e28';ctx.lineWidth=.5;
  for(let lat=-40;lat<=80;lat+=20){ctx.beginPath();for(let lon=BASE.lnA;lon<=BASE.lnB;lon+=3){const[x,y]=pr(lon,lat,w,h);lon===BASE.lnA?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();}
  for(let lon=-100;lon<=40;lon+=20){ctx.beginPath();for(let lat=BASE.ltA;lat<=BASE.ltB;lat+=3){const[x,y]=pr(lon,lat,w,h);lat===BASE.ltA?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();}

  // Land
  for(const poly of LAND){
    ctx.beginPath();
    for(let i=0;i<poly.length;i++){const[x,y]=pr(poly[i][0],poly[i][1],w,h);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.closePath();ctx.fillStyle='#1e2e24';ctx.fill();ctx.strokeStyle='#2e4832';ctx.lineWidth=.8;ctx.stroke();
  }

  // Labels
  ctx.font=`${9*cam.zoom}px system-ui`;ctx.fillStyle='#2a4030';ctx.textAlign='center';
  for(const[t,lo,la]of[['N. America',-82,48],['S. America',-52,-18],['Europe',12,50],['Africa',5,5],['Greenland',-42,73]]){const[x,y]=pr(lo,la,w,h);ctx.fillText(t,x,y);}
  ctx.fillStyle=showSST?'rgba(255,255,255,.08)':'#12222e';ctx.font=`${11*cam.zoom}px system-ui`;
  for(const[t,lo,la]of[['N O R T H   A T L A N T I C',-32,38],['S O U T H   A T L A N T I C',-22,-22]]){const[x,y]=pr(lo,la,w,h);ctx.fillText(t,x,y);}

  // Lat/lon labels when zoomed
  if(cam.zoom>1.3){
    ctx.font='8px system-ui';ctx.fillStyle='rgba(255,255,255,.15)';ctx.textAlign='center';
    for(let lat=-40;lat<=80;lat+=20){const[x,y]=pr(BASE.lnA+2,lat,w,h);ctx.fillText(lat+'°',x+15,y-3);}
    ctx.textAlign='center';
    for(let lon=-80;lon<=20;lon+=20){const[x,y]=pr(lon,BASE.ltA+2,w,h);ctx.fillText(lon+'°',x,y-5);}
  }

  // Path lines
  const showS=vw==='surface'||vw==='both',showD=vw==='deep'||vw==='both';
  const drawPath=(path,col)=>{ctx.strokeStyle=col;ctx.lineWidth=(1+aq)*cam.zoom;ctx.beginPath();for(let i=0;i<path.length;i++){const[x,y]=pr(path[i][0],path[i][1],w,h);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();};
  if(showS)drawPath(SURF,`rgba(220,100,50,${.06+aq*.1})`);
  if(showD)drawPath(DEEP,`rgba(50,100,220,${.06+aq*.1})`);

  // Particle trails
  const dpr=devicePixelRatio||1;
  const tctx=trailC.getContext('2d');
  tctx.globalCompositeOperation='destination-in';
  tctx.fillStyle=`rgba(0,0,0,${.92-aq*.04})`;
  tctx.fillRect(0,0,trailC.width,trailC.height);
  tctx.globalCompositeOperation='source-over';

  const speed=aq*.035,dir=qn>=0?1:-1;
  for(const p of P){
    const old=pPos(p,w,h);
    if(!Md.paused){p.t+=speed*dir+(Math.random()-.5)*.002;if(p.t>=LL-1)p.t-=LL-1;if(p.t<0)p.t+=LL-1;}
    const pos=pPos(p,w,h);
    if(pos.sf&&!showS)continue;if(!pos.sf&&!showD)continue;
    const al=.4+aq*.5;
    if(pos.sf){const pg=((p.t%(LL-1))+(LL-1))%(LL-1)/SE;tctx.strokeStyle=`rgba(${230-pg*30|0},${110-pg*40|0},${45+pg*60|0},${al})`;}
    else tctx.strokeStyle=`rgba(50,90,220,${al*.8})`;
    tctx.lineWidth=p.sz*(.7+aq*.6)*dpr*cam.zoom;
    tctx.beginPath();tctx.moveTo(old.x*dpr,old.y*dpr);tctx.lineTo(pos.x*dpr,pos.y*dpr);tctx.stroke();
  }

  ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.drawImage(trailC,0,0);ctx.restore();

  // Annotations
  const fs=Math.max(7,8*cam.zoom);
  if(qn>.1){const[sx,sy]=pr(-5,72,w,h);ctx.fillStyle=`rgba(80,160,240,${qn*.6})`;ctx.font=`${fs}px system-ui`;ctx.textAlign='center';ctx.fillText('DEEP WATER',sx,sy-8*cam.zoom);ctx.fillText('FORMATION',sx,sy+2*cam.zoom);}
  if(qn>.1){const[ux,uy]=pr(-52,-44,w,h);ctx.fillStyle=`rgba(80,160,240,${qn*.35})`;ctx.font=`${fs-1}px system-ui`;ctx.textAlign='center';ctx.fillText('UPWELLING',ux,uy+10*cam.zoom);}
  if(aq>.1&&cam.zoom>0.8){const[hx,hy]=pr(-75.5,35.2,w,h);ctx.fillStyle=`rgba(220,130,70,${aq*.3})`;ctx.font=`${fs-1}px system-ui`;ctx.textAlign='left';ctx.fillText('C. Hatteras',hx+5*cam.zoom,hy+3);}

  if(Math.abs(qDim)<2){ctx.fillStyle='rgba(10,16,24,.6)';ctx.fillRect(0,0,w,h);const[cx,cy]=pr(-30,28,w,h);ctx.fillStyle='rgba(230,90,90,.9)';ctx.font='bold 18px system-ui';ctx.textAlign='center';ctx.fillText('AMOC COLLAPSED',cx,cy);ctx.font='11px system-ui';ctx.fillStyle='rgba(230,150,150,.65)';ctx.fillText('Deep water formation ceased',cx,cy+18);}

  // SST color bar
  if(showSST){
    const bx=12,by=h-50,bw_=15,bh_=120;
    for(let i=0;i<bh_;i++){const t=-2+(32*i/bh_);const[r,g,b]=sstColor(t);ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(bx,by+bh_-i,bw_,1);}
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.strokeRect(bx,by,bw_,bh_);
    ctx.font='7px system-ui';ctx.fillStyle='#8098a8';ctx.textAlign='left';
    ctx.fillText('30°C',bx+bw_+3,by+5);ctx.fillText('15°C',bx+bw_+3,by+bh_/2+2);ctx.fillText('-2°C',bx+bw_+3,by+bh_);
    ctx.fillText('SST (NOAA)',bx,by-4);
  }
}

// ============================================================
// BIFURCATION
// ============================================================
function drawBif(){
  const ctx=bc,w=bw,h=bh,m={l:40,r:8,t:8,b:24},pw=w-m.l-m.r,ph=h-m.t-m.b;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#1e3040';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(m.l,m.t);ctx.lineTo(m.l,h-m.b);ctx.lineTo(w-m.r,h-m.b);ctx.stroke();
  ctx.fillStyle='#4a7090';ctx.font='8px system-ui';ctx.textAlign='center';ctx.fillText('Freshwater Forcing (F)',w/2,h-3);
  ctx.save();ctx.translate(7,h/2);ctx.rotate(-Math.PI/2);ctx.fillText('AMOC (Sv)',0,0);ctx.restore();
  const qMin=-10,qMax=25;
  for(let f=0;f<=2;f+=.5){const x=m.l+(f/2)*pw;ctx.fillText(f.toFixed(1),x,h-m.b+10);ctx.strokeStyle='#142028';ctx.beginPath();ctx.moveTo(x,m.t);ctx.lineTo(x,h-m.b);ctx.stroke();}
  ctx.textAlign='right';for(let v=-10;v<=25;v+=5){const y=m.t+(1-(v-qMin)/35)*ph;ctx.fillText(v+'',m.l-3,y+3);ctx.strokeStyle='#142028';ctx.beginPath();ctx.moveTo(m.l,y);ctx.lineTo(w-m.r,y);ctx.stroke();}
  const zy=m.t+(1-(0-qMin)/35)*ph;ctx.strokeStyle='#243848';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(m.l,zy);ctx.lineTo(w-m.r,zy);ctx.stroke();ctx.setLineDash([]);
  const sU=[],sL=[],un=[];
  for(let fi=0;fi<=300;fi++){const f=2*fi/300;for(const e of findEq(f)){const qd=e.q*C.qs,pt={x:m.l+(f/2)*pw,y:m.t+(1-(qd-qMin)/35)*ph};if(e.s&&e.q>.05)sU.push(pt);else if(e.s)sL.push(pt);else un.push(pt);}}
  const dc=(pts,col,dash)=>{if(pts.length<2)return;pts.sort((a,b)=>a.x-b.x);ctx.strokeStyle=col;ctx.lineWidth=2;ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(const p of pts)ctx.lineTo(p.x,p.y);ctx.stroke();ctx.setLineDash([]);};
  dc(sU,'#40c878',[]);dc(sL,'#40c878',[]);dc(un,'#ddb040',[4,3]);
  if(Md.bf.length>1){ctx.strokeStyle='rgba(90,150,230,.3)';ctx.lineWidth=1;ctx.beginPath();for(let i=0;i<Md.bf.length;i++){const bp=Md.bf[i],bx_=m.l+(bp.F/2)*pw,by_=m.t+(1-(bp.q*C.qs-qMin)/35)*ph;i===0?ctx.moveTo(bx_,by_):ctx.lineTo(bx_,by_);}ctx.stroke();}
  const qd=qf(Md.y,Md.x)*C.qs,cx=m.l+(C.F/2)*pw,cy=m.t+(1-(qd-qMin)/35)*ph;
  ctx.fillStyle='#50a0e0';ctx.shadowColor='#50a0e0';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.font='8px system-ui';ctx.textAlign='left';ctx.fillText(qd.toFixed(1)+' Sv',cx+6,cy-1);
}

// ============================================================
// TIME SERIES
// ============================================================
function drawTs(){
  const ctx=tc,w=tw,h=th,m={l:34,r:6,t:8,b:20},pw=w-m.l-m.r,ph=h-m.t-m.b;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#1e3040';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(m.l,m.t);ctx.lineTo(m.l,h-m.b);ctx.lineTo(w-m.r,h-m.b);ctx.stroke();
  if(Md.h.length<2)return;
  const H=Md.h,t0=H[0].t,tR=Math.max(H[H.length-1].t-t0,1),yMin=-10,yMax=30;
  ctx.fillStyle='#3a5a70';ctx.font='7px system-ui';ctx.textAlign='right';
  for(let v=-10;v<=30;v+=10){const y=m.t+(1-(v-yMin)/40)*ph;ctx.fillText(v+'',m.l-3,y+3);ctx.strokeStyle='#142028';ctx.beginPath();ctx.moveTo(m.l,y);ctx.lineTo(w-m.r,y);ctx.stroke();}
  for(const[k,s,c]of[['q',C.qs,'#40c878'],['y',C.Ts,'#d07050'],['x',C.Ss,'#5090d0']]){
    ctx.strokeStyle=c;ctx.lineWidth=1.1;ctx.beginPath();
    for(let i=0;i<H.length;i++){const v=k==='q'?H[i].q*s:H[i][k]*s;const x=m.l+((H[i].t-t0)/tR)*pw,y=m.t+(1-(v-yMin)/40)*ph;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();}
  let lx=m.l+3;ctx.font='7px system-ui';ctx.textAlign='left';
  for(const[c,l]of[['#40c878','AMOC'],['#d07050','\u0394T'],['#5090d0','\u0394S']]){ctx.fillStyle=c;ctx.fillRect(lx,m.t+2,8,2);ctx.fillText(l,lx+10,m.t+5);lx+=45;}
}

function updateSt(){
  const qd=qf(Md.y,Md.x)*C.qs;
  document.getElementById('sv').innerHTML=qd.toFixed(1)+'<span class="u">Sv</span>';
  document.getElementById('dt').innerHTML=(Md.y*C.Ts).toFixed(1)+'<span class="u">&deg;C</span>';
  document.getElementById('ds').innerHTML=(Md.x*C.Ss).toFixed(1)+'<span class="u">PSU</span>';
  const el=document.getElementById('sv'),st=document.getElementById('state');
  if(qd>10){el.className='v on';st.className='v on';st.textContent='ON';}
  else if(qd>2){el.className='v weak';st.className='v weak';st.textContent='WEAKENING';}
  else{el.className='v off';st.className='v off';st.textContent='COLLAPSED';}
}

// ============================================================
// PAN & ZOOM
// ============================================================
let drag={active:false,sx:0,sy:0,ox0:0,oy0:0};
const mapBox=document.getElementById('mapBox');

mapBox.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=mapC.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const oldZ=cam.zoom;
  const factor=e.deltaY<0?1.12:1/1.12;
  cam.zoom=Math.max(.5,Math.min(8,cam.zoom*factor));
  // Zoom toward mouse position
  cam.ox=mx-(mx-cam.ox)*(cam.zoom/oldZ);
  cam.oy=my-(my-cam.oy)*(cam.zoom/oldZ);
  // Clear trails on zoom (they're in screen space)
  trailC.getContext('2d').clearRect(0,0,trailC.width,trailC.height);
},{passive:false});

mapBox.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  drag={active:true,sx:e.clientX,sy:e.clientY,ox0:cam.ox,oy0:cam.oy};
  mapBox.classList.add('dragging');
});
window.addEventListener('mousemove',e=>{
  if(!drag.active)return;
  cam.ox=drag.ox0+(e.clientX-drag.sx);
  cam.oy=drag.oy0+(e.clientY-drag.sy);
  trailC.getContext('2d').clearRect(0,0,trailC.width,trailC.height);
});
window.addEventListener('mouseup',()=>{drag.active=false;mapBox.classList.remove('dragging');});

// Touch support
let lastTouchDist=0;
mapBox.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    const t=e.touches[0];
    drag={active:true,sx:t.clientX,sy:t.clientY,ox0:cam.ox,oy0:cam.oy};
  }else if(e.touches.length===2){
    const dx=e.touches[1].clientX-e.touches[0].clientX;
    const dy=e.touches[1].clientY-e.touches[0].clientY;
    lastTouchDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});
mapBox.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag.active){
    const t=e.touches[0];
    cam.ox=drag.ox0+(t.clientX-drag.sx);
    cam.oy=drag.oy0+(t.clientY-drag.sy);
  }else if(e.touches.length===2){
    const dx=e.touches[1].clientX-e.touches[0].clientX;
    const dy=e.touches[1].clientY-e.touches[0].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastTouchDist>0){
      const factor=dist/lastTouchDist;
      const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-mapC.getBoundingClientRect().left;
      const my=(e.touches[0].clientY+e.touches[1].clientY)/2-mapC.getBoundingClientRect().top;
      const oldZ=cam.zoom;
      cam.zoom=Math.max(.5,Math.min(8,cam.zoom*factor));
      cam.ox=mx-(mx-cam.ox)*(cam.zoom/oldZ);
      cam.oy=my-(my-cam.oy)*(cam.zoom/oldZ);
    }
    lastTouchDist=dist;
  }
  trailC.getContext('2d').clearRect(0,0,trailC.width,trailC.height);
},{passive:false});
mapBox.addEventListener('touchend',()=>{drag.active=false;lastTouchDist=0;});

// ============================================================
// MAIN LOOP
// ============================================================
function tick(){
  if(!Md.paused){const sub=Math.ceil(spd*5);for(let i=0;i<sub;i++){const r=rk(Md.y,Md.x,C.F,.01);Md.y=r.y;Md.x=r.x;Md.t+=.01;
    if(!Md.h.length||Md.t-Md.h[Md.h.length-1].t>.05){const qv=qf(Md.y,Md.x);Md.h.push({t:Md.t,y:Md.y,x:Md.x,q:qv,F:C.F});if(Md.h.length>2000)Md.h=Md.h.slice(-1000);Md.bf.push({F:C.F,q:qv});if(Md.bf.length>5000)Md.bf=Md.bf.slice(-2500);}}
  if(Md.ramp){C.F+=.002*Md.dir*spd;if(C.F>2){C.F=2;Md.ramp=0;document.getElementById('btn-ramp').classList.remove('active');}document.getElementById('f-slider').value=C.F;document.getElementById('f-val').textContent=C.F.toFixed(2);}
  if(Md.hyst){C.F+=.001*Md.dir*spd;if(C.F>1.8)Md.dir=-1;if(C.F<.1){Md.hyst=0;document.getElementById('btn-hyst').classList.remove('active');}document.getElementById('f-slider').value=C.F;document.getElementById('f-val').textContent=C.F.toFixed(2);}}
  drawMap(qf(Md.y,Md.x)*C.qs);drawBif();drawTs();updateSt();
  requestAnimationFrame(tick);
}

// Controls
document.getElementById('f-slider').oninput=e=>{C.F=+e.target.value;document.getElementById('f-val').textContent=C.F.toFixed(2);Md.ramp=Md.hyst=0;document.getElementById('btn-ramp').classList.remove('active');document.getElementById('btn-hyst').classList.remove('active');};
document.getElementById('sp-slider').oninput=e=>{spd=+e.target.value;document.getElementById('sp-val').textContent=spd.toFixed(1)+'x';};
document.getElementById('btn-reset').onclick=()=>{Md={y:C.y0,x:C.x0,t:0,h:[],bf:[],paused:0,ramp:0,dir:1,hyst:0};C.F=.5;document.getElementById('f-slider').value=.5;document.getElementById('f-val').textContent='0.50';document.querySelectorAll('.btns button.active').forEach(b=>b.classList.remove('active'));document.getElementById('btn-pause').textContent='Pause';initP();trailC.getContext('2d').clearRect(0,0,trailC.width,trailC.height);};
document.getElementById('btn-ramp').onclick=()=>{Md.hyst=0;Md.ramp=!Md.ramp;Md.dir=1;document.getElementById('btn-ramp').classList.toggle('active',Md.ramp);document.getElementById('btn-hyst').classList.remove('active');};
document.getElementById('btn-hyst').onclick=()=>{Md.ramp=0;Md.hyst=1;Md.dir=1;C.F=.1;Md.y=C.y0;Md.x=C.x0;Md.bf=[];document.getElementById('f-slider').value=C.F;document.getElementById('f-val').textContent=C.F.toFixed(2);document.getElementById('btn-hyst').classList.add('active');document.getElementById('btn-ramp').classList.remove('active');};
document.getElementById('btn-pause').onclick=()=>{Md.paused=!Md.paused;const b=document.getElementById('btn-pause');b.textContent=Md.paused?'Resume':'Pause';b.classList.toggle('active',Md.paused);};
['surface','deep','both'].forEach(m=>{document.getElementById('btn-'+m).onclick=()=>{vw=m;document.querySelectorAll('.map-ui button').forEach(b=>{if(['btn-surface','btn-deep','btn-both'].includes(b.id))b.classList.remove('active');});document.getElementById('btn-'+m).classList.add('active');trailC.getContext('2d').clearRect(0,0,trailC.width,trailC.height);};});
document.getElementById('btn-sst').onclick=()=>{showSST=!showSST;document.getElementById('btn-sst').classList.toggle('active',showSST);};
document.getElementById('btn-fit').onclick=()=>{cam={ox:0,oy:0,zoom:1};trailC.getContext('2d').clearRect(0,0,trailC.width,trailC.height);};
window.onresize=()=>{setup();sstImageData=null;};
setup();initP();tick();
</script>
