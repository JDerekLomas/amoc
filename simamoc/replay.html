<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>simamoc · replay</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, -apple-system, sans-serif; }
  body { margin: 0; background: #0a1020; color: #ddd; }
  header { padding: 8px 16px; display: flex; gap: 16px; align-items: center; border-bottom: 1px solid #1f2a44; }
  header h1 { margin: 0; font-size: 14px; font-weight: 500; opacity: 0.9; }
  header .field { display: flex; gap: 4px; }
  header button {
    background: #1a2440; border: 1px solid #2a3960; color: #ddd;
    padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
  }
  header button.active { background: #2a4080; }
  header button:hover { background: #2a3a60; }
  #status { margin-left: auto; font-size: 12px; opacity: 0.7; font-family: ui-monospace, monospace; }
  main { padding: 16px; }
  #cv {
    background: #000; display: block; max-width: 100%; height: auto;
    image-rendering: pixelated;
  }
  #controls { margin-top: 12px; display: flex; gap: 12px; align-items: center; }
  #scrubber { flex: 1; }
  #frameLabel { font-family: ui-monospace, monospace; font-size: 12px; min-width: 110px; opacity: 0.8; }
  #legend { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 11px; opacity: 0.8; }
  #legendBar { width: 200px; height: 12px; border: 1px solid #2a3960; border-radius: 2px; }
</style>
</head>
<body>
<header>
  <h1>simamoc · replay</h1>
  <div class="field">
    <button data-field="temp" class="active">temp</button>
    <button data-field="sal">salinity</button>
    <button data-field="psi">streamfunction</button>
    <button data-field="air_temp">air temp</button>
    <button data-field="ice_frac">sea ice</button>
  </div>
  <button id="playBtn">▶ play</button>
  <div id="status">loading…</div>
</header>
<main>
  <canvas id="cv" width="1024" height="512"></canvas>
  <div id="controls">
    <input id="scrubber" type="range" min="0" max="0" value="0">
    <span id="frameLabel">frame 0 / 0</span>
  </div>
  <div id="legend">
    <span id="legendLo">—</span>
    <canvas id="legendBar" width="200" height="12"></canvas>
    <span id="legendHi">—</span>
    <span id="legendUnit"></span>
  </div>
</main>
<script src="replay.js"></script>
</body>
</html>
