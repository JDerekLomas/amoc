.2],[-48,82.1],[-46.8,82.6],[-35.1,83.6],[-27.1,83.5]]];

// ============================================================
// PROJECTION (Mercator)
// ============================================================
const BASE={lnA:-105,lnB:45,ltA:-56,ltB:78};
const mercY=l=>Math.log(Math.tan(Math.PI/4+(l*Math.PI/180)/2));
const mercYmin=mercY(BASE.ltA),mercYmax=mercY(BASE.ltB);

function pr(lon,lat,w,h){
  const m=6,pw=w-2*m,ph=h-2*m;
  const x=m+((lon-BASE.lnA)/(BASE.lnB-BASE.lnA))*pw;
  const y=m+(1-(mercY(lat)-mercYmin)/(mercYmax-mercYmin))*ph;
  return[x,y];
}

// ============================================================
// SST COLORMAP
// ============================================================
function sstColor(temp){
  const t=Math.max(-2,Math.min(30,temp));
  const n=(t+2)/32;
  let r,g,b;
  if(n<.2){const f=n/.2;r=10+f*20;g=20+f*60;b=80+f*100;}
  else if(n<.4){const f=(n-.2)/.2;r=30-f*10;g=80+f*100;b=180-f*40;}
  else if(n<.6){const f=(n-.4)/.2;r=20+f*100;g=180+f*40;b=140-f*100;}
  else if(n<.8){const f=(n-.6)/.2;r=120+f*110;g=220-f*40;b=40-f*30;}
  else{const f=(n-.8)/.2;r=230+f*25;g=180-f*100;b=10+f*20;}
  return[r|0,g|0,b|0];
}

function particlePos(p,w,h){
  let t=((p.t%(LL-1))+(LL-1))%(LL-1);
  const i=Math.floor(t),f=t-i,a=LOOP[i%LL],b=LOOP[(i+1)%LL];
  const[px,py]=pr(a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,w,h);
  const[ax,ay]=pr(a[0],a[1],w,h),[bx,by]=pr(b[0],b[1],w,h);
  let dx=bx-ax,dy=by-ay;
  const l=Math.sqrt(dx*dx+dy*dy)||1;dx/=l;dy/=l;
  return{x:px+(-dy)*p.sp+dx*p.sy,y:py+dx*p.sp+dy*p.sy,sf:t<=SE};
}

// ============================================================
// SST MODIFICATION for stages
// ============================================================
function getModifiedSST(baseSst,lat,lon,coldBlob,europeCool){
  if(baseSst===null) return null;
  let temp=baseSst;

  // Cold blob south of Greenland (centered ~55N, -35W)
  if(coldBlob>0){
    const dLat=lat-55,dLon=lon-(-35);
    const dist=Math.sqrt(dLat*dLat+dLon*dLon);
    if(dist<20){
      const factor=Math.max(0,1-dist/20);
      temp-=coldBlob*8*factor;
    }
  }

  // Europe cooling effect
  if(europeCool>0 && lat>40 && lon>-20){
    const factor=Math.min(1,(lat-40)/20)*europeCool;
    temp-=factor*6;
  }

  // North Atlantic general cooling on collapse
  if(europeCool>0 && lat>30 && lat<70){
    const factor=Math.min(1,(lat-30)/15)*europeCool*0.4;
    temp-=factor*4;
  }

  return temp;
}

// ============================================================
// DRAW MAP
// ============================================================
function drawMap(){
  const ctx=mc,w=mw,h=mh;
  ctx.fillStyle='#0a1218';ctx.fillRect(0,0,w,h);

  // SST layer
  if(sstData){
    const sd=sstData, nlat=sd.lat.length, nlon=sd.lon.length;
    ctx.globalAlpha=0.6;
    for(let li=0;li<nlat-1;li++){
      for(let lo=0;lo<nlon-1;lo++){
        const baseTemp=sd.sst[li*nlon+lo];
        if(baseTemp===null) continue;
        const lat=sd.lat[li],lon=sd.lon[lo];
        const temp=getModifiedSST(baseTemp,lat,lon,displayColdBlob,displayEuropeCool);
        const[r,g,b]=sstColor(temp);
        const lat0=sd.lat[li],lat1=sd.lat[li+1];
        const lon0=sd.lon[lo],lon1=sd.lon[lo+1];
        const[x0,y0_]=pr(lon0,lat1,w,h);
        const[x1,y1_]=pr(lon1,lat0,w,h);
        ctx.fillStyle='rgb('+r+','+g+','+b+')';
        ctx.fillRect(x0,y0_,x1-x0+1,y1_-y0_+1);
      }
    }
    ctx.globalAlpha=1;
  }

  // Graticule
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=.5;
  for(let lat=-40;lat<=80;lat+=20){
    ctx.beginPath();
    for(let lon=BASE.lnA;lon<=BASE.lnB;lon+=3){
      const[x,y]=pr(lon,lat,w,h);
      lon===BASE.lnA?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  for(let lon=-100;lon<=40;lon+=20){
    ctx.beginPath();
    for(let lat=BASE.ltA;lat<=BASE.ltB;lat+=3){
      const[x,y]=pr(lon,lat,w,h);
      lat===BASE.ltA?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // Land
  for(const poly of LAND){
    ctx.beginPath();
    for(let i=0;i<poly.length;i++){
      const[x,y]=pr(poly[i][0],poly[i][1],w,h);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.fillStyle='#1a2a20';ctx.fill();
    ctx.strokeStyle='#2a4030';ctx.lineWidth=.8;ctx.stroke();
  }

  // Europe cooling overlay (Stage 4+)
  if(displayEuropeCool>0.3){
    ctx.globalAlpha=displayEuropeCool*0.15;
    // Draw a subtle blue wash over Northern Europe
    const[ex0,ey0]=pr(-10,48,w,h);
    const[ex1,ey1]=pr(30,70,w,h);
    ctx.fillStyle='#2040a0';
    ctx.fillRect(ex0,ey1,ex1-ex0,ey0-ey1);
    ctx.globalAlpha=1;
  }

  // Particles
  const speed=displayParticleSpeed;
  for(const p of particles){
    if(speed>0.01){
      p.t+=0.03*speed;
      if(p.t>=LL-1) p.t-=LL-1;
    }
    const pos=particlePos(p,w,h);
    if(pos.x<0||pos.x>w||pos.y<0||pos.y>h) continue;

    const alpha=speed>0.01?Math.min(1,speed):0.08;
    if(pos.sf){
      ctx.fillStyle='rgba(224,120,56,'+alpha*0.8+')';
      ctx.beginPath();
      ctx.arc(pos.x,pos.y,p.sz*1.2,0,Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle='rgba(56,104,208,'+alpha*0.7+')';
      ctx.beginPath();
      ctx.arc(pos.x,pos.y,p.sz,0,Math.PI*2);
      ctx.fill();
    }
  }

  // Freshwater overlay for stage 3 (melt visualization)
  if(currentStage===2 && meltFactor>0){
    const[fx,fy]=pr(-42,65,w,h);
    const grad=ctx.createRadialGradient(fx,fy,0,fx,fy,60+meltFactor*80);
    grad.addColorStop(0,'rgba(120,200,255,'+meltFactor*0.35+')');
    grad.addColorStop(1,'rgba(120,200,255,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(fx,fy,60+meltFactor*80,0,Math.PI*2);
    ctx.fill();
  }

  // Cold blob label (stages 2+)
  if(displayColdBlob>0.3){
    const[cx,cy]=pr(-35,52,w,h);
    ctx.font='11px system-ui';
    ctx.fillStyle='rgba(100,180,255,'+Math.min(1,displayColdBlob)+')';
    ctx.textAlign='center';
    ctx.fillText('Cold Blob',cx,cy);
  }

  // Stage 5: cascade labels
  if(currentStage>=4 && displayEuropeCool>0.5){
    ctx.font='10px system-ui';
    ctx.fillStyle='rgba(200,160,100,0.7)';
    ctx.textAlign='center';

    const[rx,ry]=pr(-20,8,w,h);
    ctx.fillText('Rain belt shifts \u2193',rx,ry);

    const[sx,sy]=pr(-75,35,w,h);
    ctx.fillText('Sea level +0.5m',sx,sy);

    const[ax,ay]=pr(-55,-5,w,h);
    ctx.fillText('Amazon stress',ax,ay);

    const[mx,my]=pr(-10,18,w,h);
    ctx.fillText('Monsoon disruption',mx,my);
  }
}

// ============================================================
// GAUGE
// ============================================================
function drawGauge(sv){
  const c=gaugeC,dpr=devicePixelRatio||1;
  const r=c.getBoundingClientRect();
  c.width=r.width*dpr;c.height=r.height*dpr;
  const ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  const w=r.width,h=r.height;
  const cx=w/2,cy=h-8;
  const radius=36;

  // Arc background
  ctx.lineWidth=6;ctx.lineCap='round';
  ctx.strokeStyle='#1a2a38';
  ctx.beginPath();
  ctx.arc(cx,cy,radius,Math.PI,0);
  ctx.stroke();

  // Arc value
  const frac=Math.max(0,Math.min(1,sv/20));
  let color;
  if(frac>0.6) color='#40c878';
  else if(frac>0.3) color='#ddb040';
  else color='#d06060';
  ctx.strokeStyle=color;
  ctx.beginPath();
  ctx.arc(cx,cy,radius,Math.PI,Math.PI+frac*Math.PI);
  ctx.stroke();

  // Value text
  ctx.fillStyle=color;
  ctx.font='bold 16px system-ui';
  ctx.textAlign='center';
  ctx.textBaseline='bottom';
  ctx.fillText(sv.toFixed(0),cx,cy-4);

  ctx.fillStyle='#4a6a82';
  ctx.font='9px system-ui';
  ctx.fillText('Sv',cx,cy+6);
}

// ============================================================
// HYSTERESIS DIAGRAM
// ============================================================
function drawHysteresis(){
  const c=document.getElementById('hystCanvas');
  const dpr=devicePixelRatio||1;
  const r=c.getBoundingClientRect();
  c.width=r.width*dpr;c.height=r.height*dpr;
  const ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  const w=r.width,h=r.height;
  const m=40;

  ctx.fillStyle='#0c1420';ctx.fillRect(0,0,w,h);

  // Axes
  ctx.strokeStyle='#2a4058';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(m,m);ctx.lineTo(m,h-m);ctx.lineTo(w-m,h-m);ctx.stroke();

  ctx.fillStyle='#5a7e98';ctx.font='10px system-ui';ctx.textAlign='center';
  ctx.fillText('Freshwater Forcing (F)',w/2,h-8);
  ctx.save();ctx.translate(12,h/2);ctx.rotate(-Math.PI/2);ctx.fillText('AMOC Strength (Sv)',0,0);ctx.restore();

  // S-curve (hysteresis)
  const pw=w-2*m, ph=h-2*m;
  ctx.strokeStyle='#4a9ec8';ctx.lineWidth=2;
  ctx.beginPath();
  // Upper branch (stable "on")
  for(let i=0;i<=60;i++){
    const fx=i/100;
    const sv=18*(1-Math.pow(fx/0.7,2));
    const x=m+fx*pw/1.2,y=h-m-Math.max(0,sv)/20*ph;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Unstable branch (dashed)
  ctx.strokeStyle='#2a4058';ctx.setLineDash([4,4]);ctx.lineWidth=1;
  ctx.beginPath();
  const tipX=m+0.6*pw/1.2, tipY=h-m-0*ph/20;
  const retX=m+0.3*pw/1.2, retY=h-m;
  ctx.moveTo(tipX,tipY);
  ctx.quadraticCurveTo(m+0.4*pw/1.2,h-m-2*ph/20,retX,retY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Lower branch (stable "off")
  ctx.strokeStyle='#d06060';ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<=80;i++){
    const fx=i/100;
    const x=m+fx*pw/1.2, y=h-m-1*ph/20;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Arrows
  ctx.fillStyle='#d06060';ctx.font='10px system-ui';ctx.textAlign='left';
  ctx.fillText('\u2193 collapse',tipX+4,tipY-6);
  ctx.fillStyle='#40c878';ctx.textAlign='right';
  ctx.fillText('restart \u2191',retX-4,retY-8);

  // Labels
  ctx.fillStyle='#4a9ec8';ctx.font='9px system-ui';ctx.textAlign='left';
  ctx.fillText('ON state',m+8,m+16);
  ctx.fillStyle='#d06060';
  ctx.fillText('OFF state',m+8,h-m-8);
}

// ============================================================
// NARRATIVE UI
// ============================================================
const narrativeEl=document.getElementById('narrative');
const meltControl=document.getElementById('meltControl');
const meltSlider=document.getElementById('meltSlider');
const meltValEl=document.getElementById('meltVal');
const hystBox=document.getElementById('hystBox');
const dotsEl=document.getElementById('dots');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');

// Build dots
for(let i=0;i<STAGES.length;i++){
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.onclick=()=>goToStage(i);
  dotsEl.appendChild(d);
}

function updateNarrative(){
  const s=STAGES[currentStage];
  let html='<h2>'+s.title+'</h2><p>'+s.text+'</p>';

  if(s.showRefs){
    html+='<div class="ref-links">';
    html+='<a href="https://www.nature.com/articles/s41467-023-39810-w" target="_blank">Ditlevsen & Ditlevsen (2023) &mdash; Warning of a forthcoming collapse of AMOC</a>';
    html+='<a href="https://www.nature.com/articles/s41586-024-07049-0" target="_blank">Rahmstorf et al. (2024) &mdash; Is the Atlantic overturning circulation approaching a tipping point?</a>';
    html+='<a href="https://www.ipcc.ch/report/ar6/wg1/" target="_blank">IPCC AR6 Working Group I &mdash; The Physical Science Basis</a>';
    html+='</div>';
  }

  narrativeEl.innerHTML=html;

  // Show/hide melt slider
  meltControl.style.display=s.interactive?'block':'none';

  // Show/hide hysteresis
  hystBox.style.display=s.showHysteresis?'block':'none';
  if(s.showHysteresis) drawHysteresis();

  // Update dots
  const dots=dotsEl.querySelectorAll('.dot');
  dots.forEach((d,i)=>d.className='dot'+(i===currentStage?' active':''));

  // Update nav buttons
  prevBtn.style.visibility=currentStage>0?'visible':'hidden';
  nextBtn.textContent=currentStage<STAGES.length-1?'Continue \u2192':'';
  nextBtn.style.visibility=currentStage<STAGES.length-1?'visible':'hidden';

  // Reset melt slider when leaving stage 3
  if(currentStage!==2){
    meltSlider.value=0;
    meltFactor=0;
  }
}

function goToStage(idx){
  currentStage=Math.max(0,Math.min(STAGES.length-1,idx));
  updateNarrative();
}

prevBtn.onclick=()=>goToStage(currentStage-1);
nextBtn.onclick=()=>goToStage(currentStage+1);

// Melt slider
meltSlider.oninput=function(){
  meltFactor=this.value/100;
  meltValEl.textContent=(1+meltFactor*9).toFixed(1)+'x';
};

// Keyboard navigation
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ') goToStage(currentStage+1);
  if(e.key==='ArrowLeft') goToStage(currentStage-1);
});

// ============================================================
// ANIMATION LOOP
// ============================================================
function lerp(a,b,t){return a+(b-a)*t;}

function animate(){
  const s=STAGES[currentStage];

  // Target values — stage 3 is interactive
  let targetAmoc=s.amoc;
  let targetColdBlob=s.coldBlob;
  let targetEuropeCool=s.europeCool;
  let targetSpeed=s.particleSpeed;

  if(currentStage===2){
    targetAmoc=Math.max(2,12-meltFactor*12);
    targetColdBlob=0.7+meltFactor*0.3;
    targetEuropeCool=meltFactor*0.5;
    targetSpeed=Math.max(0.05,0.6-meltFactor*0.55);
  }

  // Smooth interpolation
  displayAmoc=lerp(displayAmoc,targetAmoc,0.04);
  displayColdBlob=lerp(displayColdBlob,targetColdBlob,0.03);
  displayEuropeCool=lerp(displayEuropeCool,targetEuropeCool,0.03);
  displayParticleSpeed=lerp(displayParticleSpeed,targetSpeed,0.04);

  drawMap();
  drawGauge(displayAmoc);
  requestAnimationFrame(animate);
}

// ============================================================
// INIT
// ============================================================
function init(){
  setup();
  updateNarrative();
  animate();
}

window.addEventListener('resize',()=>{
  setup();
});

init();
</script>
