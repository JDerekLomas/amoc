<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMOC Globe Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050810;color:#c8d8e8;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
#ui{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:10}
.tabs{display:flex;justify-content:center;gap:0;padding-top:4px;pointer-events:auto}
.tabs a,.tabs span{font-size:.7em;padding:4px 12px;text-decoration:none;border:1px solid #1e3040}
.tabs a{color:#5a8aaa;background:rgba(10,18,28,.7);border-radius:4px 0 0 4px}
.tabs span{color:#a0d4f0;background:rgba(20,56,88,.7);border-radius:0 4px 4px 0}
h1{text-align:center;padding:4px 0 1px;font-size:1.15em;font-weight:300;color:#7ab8de;letter-spacing:.04em}
.sub{text-align:center;font-size:.65em;color:#5a7e98;margin-bottom:2px}
.stats{display:flex;gap:12px;justify-content:center;padding:2px 0}
.st{text-align:center}.st .l{font-size:.55em;color:#4a6a82;text-transform:uppercase;letter-spacing:.1em}
.st .v{font-size:1.15em;font-weight:300;font-variant-numeric:tabular-nums}
.st .v.on{color:#40c878}.st .v.weak{color:#ddb040}.st .v.off{color:#d06060}
.st .u{font-size:.38em;color:#4a6a82;margin-left:2px}
.panels{position:absolute;top:90px;right:10px;width:280px;display:flex;flex-direction:column;gap:6px;pointer-events:auto;z-index:10}
.panel{background:rgba(8,14,24,.88);border:1px solid rgba(30,48,64,.6);border-radius:8px;padding:8px;backdrop-filter:blur(10px)}
.panel h2{font-size:.62em;font-weight:500;color:#5a90b0;margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em}
.panel canvas{width:100%;display:block;border-radius:4px}
.ctrls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:12px;align-items:center;flex-wrap:wrap;pointer-events:auto;z-index:10;background:rgba(8,14,24,.88);border:1px solid rgba(30,48,64,.6);border-radius:8px;padding:6px 14px;backdrop-filter:blur(10px);max-width:820px}
.cg{flex:1;min-width:150px}.cg label{display:block;font-size:.68em;color:#6a8aa4;margin-bottom:1px}
input[type=range]{width:100%;accent-color:#4a9ec8;cursor:pointer}
.val{color:#4a9ec8;font-weight:600;font-variant-numeric:tabular-nums}
.btns{display:flex;gap:4px;flex-wrap:wrap}
button{background:rgba(14,26,40,.9);border:1px solid #2a4058;color:#7ab0d0;padding:4px 9px;border-radius:4px;cursor:pointer;font-size:.68em;transition:.12s}
button:hover{background:#1e3848;border-color:#4a9ec8}
button.active{background:#1a3858;border-color:#4a9ec8;color:#a0d4f0}
.map-btns{position:absolute;top:90px;left:10px;display:flex;flex-direction:column;gap:3px;z-index:10;pointer-events:auto}
.map-btns button{font-size:.62em;padding:3px 8px}
#globe{width:100%;height:100%}
.label3d{color:#8ac0e0;font-size:11px;font-family:system-ui;pointer-events:none;text-shadow:0 0 6px rgba(0,0,0,.8),0 0 12px rgba(0,0,0,.5);white-space:nowrap;opacity:0.7}
.label3d.sink{color:#60b0ff;font-weight:600;font-size:12px}
.label3d.upwell{color:#60b0ff;font-size:10px}
.label3d.current{color:#e09050;font-size:10px;font-style:italic}
.label3d.deep-label{color:#5080d0;font-size:10px;font-style:italic}
.collapsed-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:15;opacity:0;transition:opacity .5s}
.collapsed-overlay.show{opacity:1}
.collapsed-overlay h2{color:#e06060;font-size:1.6em;font-weight:300;text-shadow:0 0 20px rgba(200,40,40,.4)}
.collapsed-overlay p{color:#cc9090;font-size:.85em;margin-top:4px}
.legend-box{position:absolute;bottom:60px;left:10px;pointer-events:none;z-index:10;background:rgba(8,14,24,.7);border-radius:6px;padding:6px 8px}
.legend-box canvas{display:block;border-radius:3px}
.legend-box .lt{font-size:.55em;color:#6888a0;margin-top:2px;text-align:center}
</style>
</head>
<body>
<div id="globe"></div>
<div class="collapsed-overlay" id="collapsedOverlay"><h2>AMOC COLLAPSED</h2><p>Deep water formation has ceased</p></div>

<div id="ui">
  <div class="tabs">
    <a href="../index.html">Flat Map</a>
    <span>Globe</span>
    <a href="../v3-oscar/index.html" style="border-radius:0">Currents</a>
    <a href="../v4-physics/index.html" style="border-radius:0">Physics</a>
    <a href="../v5-story/index.html" style="border-radius:0 4px 4px 0">Story</a>
  </div>
  <h1>AMOC &mdash; Globe View</h1>
  <p class="sub">Stommel two-box model &middot; Real NOAA SST &middot; Drag to rotate</p>
  <div class="stats">
    <div class="st"><div class="l">AMOC</div><div class="v on" id="sv">--<span class="u">Sv</span></div></div>
    <div class="st"><div class="l">&Delta;T</div><div class="v" id="dt" style="color:#d07050">--<span class="u">&deg;C</span></div></div>
    <div class="st"><div class="l">&Delta;S</div><div class="v" id="ds" style="color:#5090d0">--<span class="u">PSU</span></div></div>
    <div class="st"><div class="l">State</div><div class="v on" id="state">--</div></div>
  </div>
</div>

<div class="map-btns">
  <button id="btn-sst" class="active">SST Layer</button>
  <button id="btn-surface" class="active">Surface Flow</button>
  <button id="btn-deep" class="active">Deep Flow</button>
  <button id="btn-atlantic">Atlantic View</button>
  <button id="btn-spin" class="active">Auto-Rotate</button>
</div>

<div class="panels">
  <div class="panel"><h2>Bifurcation Diagram</h2><canvas id="bif" width="280" height="180"></canvas></div>
  <div class="panel"><h2>Time Series</h2><canvas id="ts" width="280" height="150"></canvas></div>
</div>

<div class="legend-box" id="legendBox"><div class="lt">SST (NOAA OISST)</div></div>

<div class="ctrls">
  <div class="cg"><label>Freshwater Forcing &mdash; <span class="val" id="f-val">0.50</span></label>
    <input type="range" id="f-slider" min="0" max="2" step=".01" value=".5"></div>
  <div class="cg"><label>Speed &mdash; <span class="val" id="sp-val">1.0x</span></label>
    <input type="range" id="sp-slider" min=".1" max="10" step=".1" value="1"></div>
  <div class="btns">
    <button id="btn-reset">Reset</button>
    <button id="btn-ramp">Auto-Ramp</button>
    <button id="btn-hyst">Hysteresis</button>
    <button id="btn-pause">Pause</button>
  </div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {CSS2DRenderer,CSS2DObject} from 'three/addons/renderers/CSS2DRenderer.js';

// ============================================================
// STOMMEL MODEL
// ============================================================
const C={Ts:25,Ss:2,qs:20,d:1/6,y0:.8,x0:.5,F:.5};
let Md={y:C.y0,x:C.x0,t:0,h:[],bf:[],paused:0,ramp:0,dir:1,hyst:0};
let spd=1;
const qf=(y,x)=>y-x;
const dY=(y,x,q)=>1-y-Math.abs(q)*y;
const dX=(y,x,q,F)=>C.d*(F-x)-Math.abs(q)*x;
function rk(y,x,F,dt){
  const q1=qf(y,x),ky1=dY(y,x,q1),kx1=dX(y,x,q1,F);
  const q2=qf(y+.5*dt*ky1,x+.5*dt*kx1),ky2=dY(y+.5*dt*ky1,x+.5*dt*kx1,q2),kx2=dX(y+.5*dt*ky1,x+.5*dt*kx1,q2,F);
  const q3=qf(y+.5*dt*ky2,x+.5*dt*kx2),ky3=dY(y+.5*dt*ky2,x+.5*dt*kx2,q3),kx3=dX(y+.5*dt*ky2,x+.5*dt*kx2,q3,F);
  const q4=qf(y+dt*ky3,x+dt*kx3),ky4=dY(y+dt*ky3,x+dt*kx3,q4),kx4=dX(y+dt*ky3,x+dt*kx3,q4,F);
  return{y:y+(dt/6)*(ky1+2*ky2+2*ky3+ky4),x:x+(dt/6)*(kx1+2*kx2+2*kx3+kx4)};
}
function findEq(F){
  const d=C.d,R=[];let pR=null,pQ=null;
  for(let i=0;i<=2000;i++){const qv=-1.5+3*i/2000,a=Math.abs(qv),r=(1/(1+a)-d*F/(d+a))-qv;
    if(pR!==null&&r*pR<0){let lo=pQ,hi=qv,rL=pR;for(let j=0;j<40;j++){const m_=(lo+hi)/2,am=Math.abs(m_),rm=(1/(1+am)-d*F/(d+am))-m_;if(rm*rL<0)hi=m_;else{lo=m_;rL=rm;}}
    const qe=(lo+hi)/2,ae=Math.abs(qe),ye=1/(1+ae),xe=d*F/(d+ae);let a11,a12,a21,a22;
    if(qe>=0){a11=-(1+qe+ye);a12=ye;a21=-xe;a22=-(d+qe-xe);}else{a11=-(1-qe-ye);a12=-ye;a21=xe;a22=-(d-qe+xe);}
    R.push({q:qe,y:ye,x:xe,s:a11+a22<0&&a11*a22-a12*a21>0});}pR=r;pQ=qv;}return R;
}

// ============================================================
// CIRCULATION PATHS
// ============================================================
const SURF=[[-55,-45],[-50,-38],[-46,-32],[-42,-24],[-38,-16],[-36,-8],[-35,-2],[-38,4],[-48,8],[-58,12],[-66,17],[-74,22],[-80,25.5],[-79.5,30],[-77,33],[-75.5,35.2],[-72,37],[-68,38.5],[-62,40],[-55,41],[-50,42],[-42,44],[-35,47],[-28,50],[-20,53],[-15,56],[-10,58],[-5,60],[0,62],[5,64],[5,67],[2,70],[-5,72]];
const DEEP=[[-5,72],[-10,70],[-18,68],[-24,66.5],[-30,65],[-38,63],[-46,60],[-52,57],[-52,52],[-53,47],[-55,42],[-56,38],[-54,34],[-52,30],[-50,26],[-48,22],[-45,18],[-42,12],[-40,6],[-38,0],[-37,-6],[-38,-12],[-40,-18],[-44,-24],[-48,-30],[-52,-36],[-55,-42],[-55,-45]];
const LOOP=SURF.concat(DEEP.slice(1)),LL=LOOP.length,SE=SURF.length-1;

// ============================================================
// THREE.JS SCENE
// ============================================================
const R_=1;
const container=document.getElementById('globe');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.01,100);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x040810);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
container.appendChild(renderer.domElement);

// CSS2D labels
const labelRenderer=new CSS2DRenderer();
labelRenderer.setSize(innerWidth,innerHeight);
labelRenderer.domElement.style.position='absolute';
labelRenderer.domElement.style.top='0';
labelRenderer.domElement.style.pointerEvents='none';
container.appendChild(labelRenderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.06;
controls.minDistance=1.2;
controls.maxDistance=5;
controls.enablePan=false;
controls.autoRotate=true;
controls.autoRotateSpeed=0.3;

// Lighting
const hemiLight=new THREE.HemisphereLight(0x88aacc,0x222244,0.7);
scene.add(hemiLight);
const sunLight=new THREE.DirectionalLight(0xffeedd,1.2);
sunLight.position.set(5,3,4);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x223344,0.3));

// Stars
const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(4000*3);
for(let i=0;i<4000;i++){
  const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=10+Math.random()*15;
  starPos[i*3]=r*Math.sin(ph)*Math.cos(th);starPos[i*3+1]=r*Math.sin(ph)*Math.sin(th);starPos[i*3+2]=r*Math.cos(ph);
}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0x8888aa,size:.012,sizeAttenuation:true})));

// ============================================================
// GLOBE
// ============================================================
function ll2xyz(lat,lon,r){
  const p=(90-lat)*Math.PI/180,t=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));
}

const globeGeo=new THREE.SphereGeometry(R_,128,64);
const globeMat=new THREE.MeshStandardMaterial({color:0x1a2840,roughness:0.85,metalness:0.05});
const globe=new THREE.Mesh(globeGeo,globeMat);
scene.add(globe);

// Load Blue Marble
new THREE.TextureLoader().load('earth_2048.jpg',tex=>{
  tex.colorSpace=THREE.SRGBColorSpace;
  globeMat.map=tex;globeMat.color.set(0xffffff);globeMat.needsUpdate=true;
});

// Atmosphere
const atmosMat=new THREE.ShaderMaterial({
  vertexShader:`varying vec3 vNorm;void main(){vNorm=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 vNorm;void main(){float i=pow(0.62-dot(vNorm,vec3(0,0,1)),3.0);gl_FragColor=vec4(0.35,0.6,1.0,i*0.35);}`,
  transparent:true,side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(R_*1.018,64,32),atmosMat));

// ============================================================
// SST OVERLAY
// ============================================================
const TEX_W=2048,TEX_H=1024;
const texCanvas=document.createElement('canvas');texCanvas.width=TEX_W;texCanvas.height=TEX_H;
const texCtx=texCanvas.getContext('2d');
const sstTex=new THREE.CanvasTexture(texCanvas);
const sstMesh=new THREE.Mesh(
  new THREE.SphereGeometry(R_*1.003,128,64),
  new THREE.MeshBasicMaterial({map:sstTex,transparent:true,opacity:0.55,depthWrite:false})
);
scene.add(sstMesh);

function sstColor(temp){
  const t=Math.max(-2,Math.min(30,temp)),n=(t+2)/32;
  let r,g,b;
  if(n<.15){const f=n/.15;r=8+f*15;g=20+f*50;b=70+f*90;}
  else if(n<.3){const f=(n-.15)/.15;r=23+f*5;g=70+f*80;b=160+f*20;}
  else if(n<.5){const f=(n-.3)/.2;r=28+f*50;g=150+f*60;b=180-f*90;}
  else if(n<.7){const f=(n-.5)/.2;r=78+f*140;g=210+f*20;b=90-f*60;}
  else if(n<.85){const f=(n-.7)/.15;r=218+f*32;g=230-f*80;b=30-f*10;}
  else{const f=(n-.85)/.15;r=250;g=150-f*90;b=20+f*15;}
  return[r|0,g|0,b|0];
}

let sstData_=null,sstLoaded=false,showSST_=true;
function lonLatToTex(lon,lat){return[((lon+180)/360)*TEX_W,((90-lat)/180)*TEX_H];}

function drawSST(sst){
  texCtx.clearRect(0,0,TEX_W,TEX_H);
  const nl=sst.lat.length,no=sst.lon.length;
  for(let li=0;li<nl;li++){for(let lo=0;lo<no;lo++){
    const t=sst.sst[li*no+lo];if(t===null)continue;
    const[r,g,b]=sstColor(t);
    const[x,y]=lonLatToTex(sst.lon[lo],sst.lat[li]);
    const[x2]=lonLatToTex(sst.lon[lo]+1,sst.lat[li]);
    const[,y2]=lonLatToTex(sst.lon[lo],sst.lat[li]-1);
    texCtx.fillStyle=`rgb(${r},${g},${b})`;
    texCtx.fillRect(x,y,Math.max(x2-x,2),Math.max(y2-y,2));
  }}
  sstTex.needsUpdate=true;
}

fetch('sst_atlantic_1deg.json').then(r=>r.json()).then(sst=>{sstData_=sst;sstLoaded=true;drawSST(sst);}).catch(()=>{});

// SST legend
(function(){
  const c=document.createElement('canvas');c.width=18;c.height=120;
  const ctx=c.getContext('2d');
  for(let i=0;i<120;i++){const t=-2+(32*(120-i)/120);const[r,g,b]=sstColor(t);ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(0,i,18,1);}
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.strokeRect(0,0,18,120);
  ctx.fillStyle='#7098b0';ctx.font='8px system-ui';ctx.textAlign='left';
  ctx.fillText('30°C',20,7);ctx.fillText('15°',20,62);ctx.fillText('-2°',20,118);
  document.getElementById('legendBox').prepend(c);
})();

// ============================================================
// CIRCULATION PATH LINES (TubeGeometry for visibility)
// ============================================================
function makePathCurve(path,alt){
  const pts=path.map(([lon,lat])=>ll2xyz(lat,lon,R_+alt));
  return new THREE.CatmullRomCurve3(pts,false);
}

function createTubeLine(path,color,alt,radius){
  const curve=makePathCurve(path,alt);
  const geo=new THREE.TubeGeometry(curve,path.length*6,radius,6,false);
  const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.35});
  return new THREE.Mesh(geo,mat);
}

const surfTube=createTubeLine(SURF,0xff8040,0.006,0.004);
const deepTube=createTubeLine(DEEP,0x4070e0,0.002,0.003);
scene.add(surfTube);scene.add(deepTube);

let showSurf=true,showDeep=true;

// ============================================================
// 3D LABELS
// ============================================================
function addLabel(text,lat,lon,cls){
  const div=document.createElement('div');
  div.className='label3d '+(cls||'');
  div.textContent=text;
  const obj=new CSS2DObject(div);
  obj.position.copy(ll2xyz(lat,lon,R_+0.02));
  scene.add(obj);
  return obj;
}

const lblSink=addLabel('Deep Water Formation',72,-5,'sink');
const lblUpwell=addLabel('Upwelling',-44,-52,'upwell');
const lblGS=addLabel('Gulf Stream',35,-72,'current');
const lblNAC=addLabel('N. Atlantic Current',52,-20,'current');
const lblNADW=addLabel('NADW',50,-52,'deep-label');

// ============================================================
// PARTICLES
// ============================================================
const NP=800;
const pPos_=new Float32Array(NP*3),pCol=new Float32Array(NP*3),pSz=new Float32Array(NP);
const particles=[];for(let i=0;i<NP;i++)particles.push({t:Math.random()*(LL-1),off:(Math.random()-.5)*.012});

const pGeo=new THREE.BufferGeometry();
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos_,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
pGeo.setAttribute('size',new THREE.BufferAttribute(pSz,1));

const pMat=new THREE.ShaderMaterial({
  vertexShader:`
    attribute float size;attribute vec3 color;varying vec3 vC;
    void main(){vC=color;vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=size*(80./-mv.z);gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`
    varying vec3 vC;
    void main(){float d=length(gl_PointCoord-.5);if(d>.5)discard;
    float a=smoothstep(.5,.15,d);
    gl_FragColor=vec4(vC,a*.55);}`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
});
scene.add(new THREE.Points(pGeo,pMat));

function updateParticles(qDim){
  const qn=Math.max(-1,Math.min(1,qDim/C.qs)),aq=Math.abs(qn);
  const speed=aq*.035,dir=qn>=0?1:-1;
  for(let i=0;i<NP;i++){
    const p=particles[i];
    if(!Md.paused){p.t+=speed*dir+(Math.random()-.5)*.002;if(p.t>=LL-1)p.t-=LL-1;if(p.t<0)p.t+=LL-1;}
    let t=((p.t%(LL-1))+(LL-1))%(LL-1);
    const idx=Math.floor(t),fr=t-idx,a=LOOP[idx%LL],b=LOOP[(idx+1)%LL];
    const lon=a[0]+(b[0]-a[0])*fr,lat=a[1]+(b[1]-a[1])*fr;
    const isSurf=t<=SE;
    const alt=isSurf?.008:.002;
    const pos=ll2xyz(lat,lon,R_+alt);
    const n=pos.clone().normalize();
    pos.add(n.multiplyScalar(p.off));
    pPos_[i*3]=pos.x;pPos_[i*3+1]=pos.y;pPos_[i*3+2]=pos.z;
    const vis=(isSurf&&showSurf)||(!isSurf&&showDeep)?1:0;
    if(isSurf){
      const pg=t/SE;
      pCol[i*3]=(1-.1*pg)*vis;pCol[i*3+1]=(.45-.15*pg)*vis;pCol[i*3+2]=(.15+.25*pg)*vis;
    }else{
      pCol[i*3]=.15*vis;pCol[i*3+1]=.35*vis;pCol[i*3+2]=.9*vis;
    }
    pSz[i]=(0.8+aq*1.2)*vis;
  }
  pGeo.attributes.position.needsUpdate=true;
  pGeo.attributes.color.needsUpdate=true;
  pGeo.attributes.size.needsUpdate=true;
}

// ============================================================
// 2D PANELS
// ============================================================
function initCanvas(c){const dpr=devicePixelRatio||1,r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=r.height*dpr;const ctx=c.getContext('2d');ctx.scale(dpr,dpr);return{ctx,w:r.width,h:r.height};}
let bc,bw,bh,tc_,tw,th;
function setupPanels(){({ctx:bc,w:bw,h:bh}=initCanvas(document.getElementById('bif')));({ctx:tc_,w:tw,h:th}=initCanvas(document.getElementById('ts')));}

function drawBif(){
  const ctx=bc,w=bw,h=bh,m={l:32,r:4,t:4,b:18},pw=w-m.l-m.r,ph=h-m.t-m.b;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#1a2838';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(m.l,m.t);ctx.lineTo(m.l,h-m.b);ctx.lineTo(w-m.r,h-m.b);ctx.stroke();
  ctx.fillStyle='#4a7090';ctx.font='7px system-ui';ctx.textAlign='center';ctx.fillText('Freshwater Forcing (F)',w/2,h-2);
  const qMin=-10;
  for(let f=0;f<=2;f+=.5){const x=m.l+(f/2)*pw;ctx.fillText(f.toFixed(1),x,h-m.b+9);ctx.strokeStyle='#101820';ctx.beginPath();ctx.moveTo(x,m.t);ctx.lineTo(x,h-m.b);ctx.stroke();}
  ctx.textAlign='right';for(let v=0;v<=20;v+=10){const y=m.t+(1-(v-qMin)/35)*ph;ctx.fillText(v+'',m.l-2,y+3);ctx.strokeStyle='#101820';ctx.beginPath();ctx.moveTo(m.l,y);ctx.lineTo(w-m.r,y);ctx.stroke();}
  const sU=[],sL=[],un=[];
  for(let fi=0;fi<=200;fi++){const f=2*fi/200;for(const e of findEq(f)){const qd=e.q*C.qs,pt={x:m.l+(f/2)*pw,y:m.t+(1-(qd-qMin)/35)*ph};if(e.s&&e.q>.05)sU.push(pt);else if(e.s)sL.push(pt);else un.push(pt);}}
  const dc=(pts,col,dash)=>{if(pts.length<2)return;pts.sort((a,b)=>a.x-b.x);ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(const p of pts)ctx.lineTo(p.x,p.y);ctx.stroke();ctx.setLineDash([]);};
  dc(sU,'#40c878',[]);dc(sL,'#40c878',[]);dc(un,'#ddb040',[3,2]);
  if(Md.bf.length>1){ctx.strokeStyle='rgba(90,150,230,.3)';ctx.lineWidth=.8;ctx.beginPath();for(let i=0;i<Md.bf.length;i++){const bp=Md.bf[i],bx_=m.l+(bp.F/2)*pw,by_=m.t+(1-(bp.q*C.qs-qMin)/35)*ph;i===0?ctx.moveTo(bx_,by_):ctx.lineTo(bx_,by_);}ctx.stroke();}
  const qd=qf(Md.y,Md.x)*C.qs,cx=m.l+(C.F/2)*pw,cy=m.t+(1-(qd-qMin)/35)*ph;
  ctx.fillStyle='#50a0e0';ctx.shadowColor='#50a0e0';ctx.shadowBlur=4;ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
}

function drawTs(){
  const ctx=tc_,w=tw,h=th,m={l:28,r:4,t:4,b:14},pw=w-m.l-m.r,ph=h-m.t-m.b;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#1a2838';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(m.l,m.t);ctx.lineTo(m.l,h-m.b);ctx.lineTo(w-m.r,h-m.b);ctx.stroke();
  if(Md.h.length<2)return;
  const H=Md.h,t0=H[0].t,tR=Math.max(H[H.length-1].t-t0,1),yMin=-5,yMax=25;
  for(const[k,s,c]of[['q',C.qs,'#40c878'],['y',C.Ts,'#d07050'],['x',C.Ss,'#5090d0']]){
    ctx.strokeStyle=c;ctx.lineWidth=1;ctx.beginPath();
    for(let i=0;i<H.length;i++){const v=k==='q'?H[i].q*s:H[i][k]*s;const x=m.l+((H[i].t-t0)/tR)*pw,y=m.t+(1-(v-yMin)/30)*ph;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();}
  let lx=m.l+2;ctx.font='6px system-ui';ctx.textAlign='left';
  for(const[c,l]of[['#40c878','AMOC'],['#d07050','\u0394T'],['#5090d0','\u0394S']]){ctx.fillStyle=c;ctx.fillRect(lx,m.t+1,6,2);ctx.fillText(l,lx+8,m.t+4);lx+=38;}
}

function updateSt(){
  const qd=qf(Md.y,Md.x)*C.qs;
  document.getElementById('sv').innerHTML=qd.toFixed(1)+'<span class="u">Sv</span>';
  document.getElementById('dt').innerHTML=(Md.y*C.Ts).toFixed(1)+'<span class="u">&deg;C</span>';
  document.getElementById('ds').innerHTML=(Md.x*C.Ss).toFixed(1)+'<span class="u">PSU</span>';
  const el=document.getElementById('sv'),st=document.getElementById('state');
  if(qd>10){el.className='v on';st.className='v on';st.textContent='ON';}
  else if(qd>2){el.className='v weak';st.className='v weak';st.textContent='WEAKENING';}
  else{el.className='v off';st.className='v off';st.textContent='COLLAPSED';}
  // Collapsed overlay
  document.getElementById('collapsedOverlay').classList.toggle('show',Math.abs(qd)<2);
  // Dim labels when collapsed
  const la=Math.abs(qd)<2?0.2:0.7;
  [lblSink,lblUpwell,lblGS,lblNAC,lblNADW].forEach(l=>l.element.style.opacity=la);
}

// ============================================================
// CAMERA ANIMATION
// ============================================================
let camTarget=null,camLerp=0;
function animateCamera(lat,lon,dist,duration){
  camTarget={pos:ll2xyz(lat,lon,dist),t:new THREE.Vector3(0,.1,0),dur:duration||1.5};
  camLerp=0;
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime=performance.now();
function tick(now){
  const dt_=(now-lastTime)/1000;lastTime=now;

  // Physics
  if(!Md.paused){
    const sub=Math.ceil(spd*5);
    for(let i=0;i<sub;i++){
      const r=rk(Md.y,Md.x,C.F,.01);Md.y=r.y;Md.x=r.x;Md.t+=.01;
      if(!Md.h.length||Md.t-Md.h[Md.h.length-1].t>.05){
        const qv=qf(Md.y,Md.x);
        Md.h.push({t:Md.t,y:Md.y,x:Md.x,q:qv,F:C.F});
        if(Md.h.length>2000)Md.h=Md.h.slice(-1000);
        Md.bf.push({F:C.F,q:qv});
        if(Md.bf.length>5000)Md.bf=Md.bf.slice(-2500);
      }
    }
    if(Md.ramp){C.F+=.002*Md.dir*spd;if(C.F>2){C.F=2;Md.ramp=0;document.getElementById('btn-ramp').classList.remove('active');}document.getElementById('f-slider').value=C.F;document.getElementById('f-val').textContent=C.F.toFixed(2);}
    if(Md.hyst){C.F+=.001*Md.dir*spd;if(C.F>1.8)Md.dir=-1;if(C.F<.1){Md.hyst=0;document.getElementById('btn-hyst').classList.remove('active');}document.getElementById('f-slider').value=C.F;document.getElementById('f-val').textContent=C.F.toFixed(2);}
  }

  // Camera animation
  if(camTarget){
    camLerp=Math.min(1,camLerp+dt_/camTarget.dur);
    const t=1-Math.pow(1-camLerp,3); // ease out cubic
    camera.position.lerp(camTarget.pos,t*.15);
    controls.target.lerp(camTarget.t,t*.15);
    if(camLerp>=1)camTarget=null;
  }

  // Tube opacity based on AMOC strength
  const qDim=qf(Md.y,Md.x)*C.qs;
  const aq=Math.abs(Math.max(-1,Math.min(1,qDim/C.qs)));
  surfTube.material.opacity=0.15+aq*0.35;
  deepTube.material.opacity=0.12+aq*0.3;

  updateParticles(qDim);
  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
  drawBif();drawTs();updateSt();
  requestAnimationFrame(tick);
}

// ============================================================
// CONTROLS
// ============================================================
document.getElementById('f-slider').oninput=e=>{C.F=+e.target.value;document.getElementById('f-val').textContent=C.F.toFixed(2);Md.ramp=Md.hyst=0;document.getElementById('btn-ramp').classList.remove('active');document.getElementById('btn-hyst').classList.remove('active');};
document.getElementById('sp-slider').oninput=e=>{spd=+e.target.value;document.getElementById('sp-val').textContent=spd.toFixed(1)+'x';};
document.getElementById('btn-reset').onclick=()=>{Md={y:C.y0,x:C.x0,t:0,h:[],bf:[],paused:0,ramp:0,dir:1,hyst:0};C.F=.5;document.getElementById('f-slider').value=.5;document.getElementById('f-val').textContent='0.50';document.querySelectorAll('.btns button.active').forEach(b=>b.classList.remove('active'));document.getElementById('btn-pause').textContent='Pause';for(const p of particles)p.t=Math.random()*(LL-1);};
document.getElementById('btn-ramp').onclick=()=>{Md.hyst=0;Md.ramp=!Md.ramp;Md.dir=1;document.getElementById('btn-ramp').classList.toggle('active',Md.ramp);document.getElementById('btn-hyst').classList.remove('active');};
document.getElementById('btn-hyst').onclick=()=>{Md.ramp=0;Md.hyst=1;Md.dir=1;C.F=.1;Md.y=C.y0;Md.x=C.x0;Md.bf=[];document.getElementById('f-slider').value=C.F;document.getElementById('f-val').textContent=C.F.toFixed(2);document.getElementById('btn-hyst').classList.add('active');document.getElementById('btn-ramp').classList.remove('active');};
document.getElementById('btn-pause').onclick=()=>{Md.paused=!Md.paused;const b=document.getElementById('btn-pause');b.textContent=Md.paused?'Resume':'Pause';b.classList.toggle('active',Md.paused);};
document.getElementById('btn-sst').onclick=function(){showSST_=!showSST_;this.classList.toggle('active',showSST_);sstMesh.visible=showSST_;};
document.getElementById('btn-surface').onclick=function(){showSurf=!showSurf;this.classList.toggle('active',showSurf);surfTube.visible=showSurf;};
document.getElementById('btn-deep').onclick=function(){showDeep=!showDeep;this.classList.toggle('active',showDeep);deepTube.visible=showDeep;};
document.getElementById('btn-atlantic').onclick=()=>animateCamera(20,-35,2.5);
document.getElementById('btn-spin').onclick=function(){controls.autoRotate=!controls.autoRotate;this.classList.toggle('active',controls.autoRotate);};

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  labelRenderer.setSize(innerWidth,innerHeight);
  setupPanels();
});

// Initial Atlantic view
camera.position.copy(ll2xyz(20,-30,2.6));
controls.target.set(0,.1,0);
controls.update();

setupPanels();
requestAnimationFrame(tick);
</script>
