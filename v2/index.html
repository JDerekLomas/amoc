<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimAMOC v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080e18; color: #c8d8e8; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
header { text-align: center; padding: 8px; }
h1 { font-size: 1.2em; font-weight: 300; color: #7ab8de; }
.sub { font-size: 0.65em; color: #4a6a82; }
.main { flex: 1; display: flex; gap: 8px; padding: 4px 8px; min-height: 0; }
.view { flex: 1; position: relative; background: #060c16; border: 1px solid #1a2838; border-radius: 6px; overflow: hidden; }
.view canvas { width: 100%; height: 100%; image-rendering: pixelated; }
.sidebar { width: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.panel { background: #0c1420; border: 1px solid #1a2838; border-radius: 6px; padding: 8px; }
.panel h2 { font-size: 0.6em; color: #4a7a98; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.st { text-align: center; }
.st .l { font-size: 0.5em; color: #3a5a72; text-transform: uppercase; }
.st .v { font-size: 0.85em; color: #4a9ec8; font-variant-numeric: tabular-nums; }
button { background: #101e2e; border: 1px solid #2a4058; color: #7ab0d0; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 0.62em; margin: 1px; }
button:hover { background: #1e3848; }
button.active { background: #1a3858; border-color: #4a9ec8; color: #a0d4f0; }
.btns { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 4px; }
.cg { margin-bottom: 4px; }
.cg label { font-size: 0.6em; color: #5a8aa4; display: block; }
input[type=range] { width: 100%; accent-color: #4a9ec8; }
.val { color: #4a9ec8; font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>SimAMOC v2 <span class="sub">-- component architecture + moisture physics</span></h1>
  <div class="sub">256x128 | coupled atmosphere-ocean | P-E freshwater forcing</div>
</header>

<div class="main">
  <div class="view">
    <canvas id="sim"></canvas>
  </div>
  <div class="sidebar">
    <div class="panel">
      <h2>Simulation</h2>
      <div class="stats" id="stats">
        <div class="st"><div class="l">Step</div><div class="v" id="s-step">0</div></div>
        <div class="st"><div class="l">Year</div><div class="v" id="s-year">0.0</div></div>
        <div class="st"><div class="l">SST</div><div class="v" id="s-sst">--</div></div>
        <div class="st"><div class="l">AMOC</div><div class="v" id="s-amoc">--</div></div>
        <div class="st"><div class="l">Max V</div><div class="v" id="s-vel">--</div></div>
        <div class="st"><div class="l">Ice</div><div class="v" id="s-ice">--</div></div>
      </div>
      <div class="btns">
        <button id="btn-pause">Pause</button>
        <button id="btn-reset">Reset</button>
      </div>
    </div>

    <div class="panel">
      <h2>View</h2>
      <div class="btns" id="view-btns">
        <button class="active" data-field="temp">SST</button>
        <button data-field="sal">Salinity</button>
        <button data-field="psi">Streamfn</button>
        <button data-field="speed">Speed</button>
        <button data-field="humidity">Humidity</button>
        <button data-field="pe">P-E</button>
      </div>
    </div>

    <div class="panel">
      <h2>Parameters</h2>
      <div class="cg">
        <label>Wind Strength -- <span class="val" id="v-wind">1.00</span></label>
        <input type="range" id="p-wind" min="0" max="3" step="0.05" value="1">
      </div>
      <div class="cg">
        <label>Solar (S) -- <span class="val" id="v-solar">7.0</span></label>
        <input type="range" id="p-solar" min="3" max="12" step="0.1" value="7">
      </div>
      <div class="cg">
        <label>OLR Feedback (B) -- <span class="val" id="v-bolr">0.10</span></label>
        <input type="range" id="p-bolr" min="0.02" max="0.3" step="0.01" value="0.1">
      </div>
      <div class="cg">
        <label>P-E Strength -- <span class="val" id="v-pe">0.50</span></label>
        <input type="range" id="p-pe" min="0" max="2" step="0.05" value="0.5">
      </div>
      <div class="cg">
        <label>Friction (r) -- <span class="val" id="v-fric">0.040</span></label>
        <input type="range" id="p-fric" min="0.005" max="0.15" step="0.005" value="0.04">
      </div>
      <div class="cg">
        <label>Steps/Frame -- <span class="val" id="v-spf">50</span></label>
        <input type="range" id="p-spf" min="1" max="200" step="1" value="50">
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createGrid, createState } from './state.js';
import { defaultParams } from './params.js';
import { step, diagnostics } from './coupler.js';
import { initialize } from './init.js';
import { render } from './renderer.js';

const grid = createGrid(256, 128);
const state = createState(grid);
const params = defaultParams();

let paused = false;
let currentField = 'temp';
let stepsPerFrame = 50;

const canvas = document.getElementById('sim');

document.getElementById('btn-pause').onclick = () => {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? 'Resume' : 'Pause';
};

document.getElementById('btn-reset').onclick = async () => {
  paused = true;
  const fresh = createState(grid);
  for (const key of Object.keys(fresh)) {
    if (state[key] && fresh[key] && typeof fresh[key].set === 'function') {
      state[key].set(fresh[key]);
    } else {
      state[key] = fresh[key];
    }
  }
  await initialize(state, grid);
  paused = false;
};

document.getElementById('view-btns').onclick = (e) => {
  if (e.target.dataset.field) {
    currentField = e.target.dataset.field;
    document.querySelectorAll('#view-btns button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
  }
};

const sliders = [
  ['p-wind', 'v-wind', 'wind_strength', v => v.toFixed(2)],
  ['p-solar', 'v-solar', 'S_solar', v => v.toFixed(1)],
  ['p-bolr', 'v-bolr', 'B_olr', v => v.toFixed(2)],
  ['p-pe', 'v-pe', 'pe_sal_flux', v => v.toFixed(2)],
  ['p-fric', 'v-fric', 'r_drag', v => v.toFixed(3)],
  ['p-spf', 'v-spf', null, v => v.toFixed(0)],
];

for (const [sliderId, valId, paramKey, fmt] of sliders) {
  const el = document.getElementById(sliderId);
  el.oninput = () => {
    const v = parseFloat(el.value);
    document.getElementById(valId).textContent = fmt(v);
    if (paramKey) params[paramKey] = v;
    else stepsPerFrame = v;
  };
}

let frameCount = 0;
function loop() {
  if (!paused && state.mask.some(v => v)) {
    step(state, grid, params, stepsPerFrame);
  }

  render(canvas, state, grid, currentField);

  if (frameCount++ % 10 === 0) {
    const d = diagnostics(state, grid);
    document.getElementById('s-step').textContent = d.step;
    document.getElementById('s-year').textContent = d.simYears.toFixed(1);
    document.getElementById('s-sst').textContent = isNaN(d.globalSST) ? '--' : d.globalSST.toFixed(1) + 'C';
    document.getElementById('s-vel').textContent = d.maxVel.toFixed(2);
    document.getElementById('s-ice').textContent = d.iceArea;
  }

  requestAnimationFrame(loop);
}

console.log('[v2] Initializing...');
await initialize(state, grid);
console.log('[v2] Starting simulation');
loop();
</script>
</body>
</html>
